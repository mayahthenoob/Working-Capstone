<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Fill In Blanks Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #f04e84 0%, #7c3a91 100%);
    padding: 20px;
}

.form-container {
    background-color: white;
    padding: 40px;
    border-radius: 8px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 800px;
}

h2 {
    margin-top: 0;
    color: #666;
    font-weight: 500;
    margin-bottom: 30px;
    text-align: center;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group.full-width {
    grid-column: span 2;
}

label {
    font-size: 14px;
    color: #777;
    margin-bottom: 8px;
}

input, textarea {
    padding: 12px;
    border: 1px solid #f2f2f2;
    background-color: #f9f9f9;
    border-radius: 4px;
    font-size: 14px;
    color: #333;
    outline: none;
    width: 100%;
}

textarea {
    resize: vertical;
    min-height: 80px;
}

input:focus, textarea:focus {
    border-color: #4a90e2;
}

/* RADIO & CHECKBOX STYLING */
.radio-group {
    display: flex;
    flex-wrap: wrap;   /* allows items to stay in one row and wrap on smaller screens */
    align-items: center;
    gap: 20px;
    margin-top: 12px;
}

.radio-option {
    display: flex;
    align-items: center; /* vertical center */
    gap: 8px;
    font-size: 14px;
    white-space: nowrap; /* keep checkbox text on same line */
}

#wordsContainer {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.formatted-date, .total-time {
    font-size: 14px;
    color: #555;
    margin-top: 6px;
}

.button-row {
    display: flex;
    justify-content: space-between;
    margin-top: 30px;
}

.action-btn {
    border: none;
    padding: 12px 30px;
    border-radius: 4px;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.preview-btn {
    background-color: #999;
    color: white;
}

.preview-btn:hover {
    background-color: #777;
}

.publish-btn {
    background-color: #28a745;
    color: white;
}

.publish-btn:hover {
    background-color: #1e7e34;
}

@media (max-width: 600px) {
    .form-grid {
        grid-template-columns: 1fr;
    }

    .form-group.full-width {
        grid-column: span 1;
    }

    .form-container {
        padding: 20px;
    }
}

@media (max-width: 480px) {
    .button-row {
        flex-direction: column;
        gap: 10px;
    }
}
</style>
</head>

<body>

<div class="form-container">
<h2>Fill In Blanks Form</h2>

<form>
<div class="form-grid">

<div class="form-group full-width">
<label for="title">Title</label>
<input type="text" id="title" required>
</div>

<div class="form-group full-width">
<label for="description">Description</label>
<textarea id="description"></textarea>

<div class="radio-group">
<div class="radio-option">
<input type="radio" name="mode" value="default"> Default
</div>
<div class="radio-option">
<input type="radio" name="mode" value="custom"> Custom
</div>
</div>
</div>

<div class="form-group">
<label>Category</label>
<input type="text" id="category">
</div>

<div class="form-group">
<label>Amount</label>
<input type="number" id="amount" min="1" max="30" required>
</div>

<div class="form-group full-width">
<label>Sentences for Fill in Blanks</label>
<div id="wordsContainer"></div>
</div>

<!-- Attempts Allowed -->
<div class="form-group full-width">
<label>Attempts Allowed</label>
<div class="radio-group">
<div class="radio-option"><input type="radio" name="attempts" value="1"> 1</div>
<div class="radio-option"><input type="radio" name="attempts" value="2"> 2</div>
<div class="radio-option"><input type="radio" name="attempts" value="3"> 3</div>
</div>
</div>

<!-- Grading Criteria -->
<div class="form-group full-width">
<label>Grading Criteria</label>
<div class="radio-group">
<div class="radio-option">
<input type="checkbox" name="grading" value="highest_score"> Highest Score
</div>
<div class="radio-option">
<input type="checkbox" name="grading" value="fastest_time"> Fastest Time
</div>
<div class="radio-option">
<input type="checkbox" name="grading" value="highest_streak"> Highest Streak
</div>
</div>
</div>

<div class="form-group">
<label>Opens</label>
<input type="datetime-local" id="opens">
<div id="opensFormatted" class="formatted-date"></div>
</div>

<div class="form-group">
<label>Closes</label>
<input type="datetime-local" id="closes">
<div id="closesFormatted" class="formatted-date"></div>
</div>

<div class="form-group full-width">
<label>Time Limit (Minutes)</label>
<input type="number" id="timeLimit" min="0">
<div id="totalTime" class="total-time"></div>
</div>

</div>

<div class="button-row">
    <button type="button" class="action-btn preview-btn">Preview</button>
    <button type="submit" class="action-btn publish-btn">Publish</button>
</div>

</form>
</div>

<script>
// SENTENCE GENERATOR
const amountInput = document.getElementById("amount");
const wordsContainer = document.getElementById("wordsContainer");

amountInput.addEventListener("input", function () {
    let amount = parseInt(this.value);

    if (amount > 30) { amount = 30; this.value = 30; }
    if (amount < 1 || isNaN(amount)) { wordsContainer.innerHTML = ""; return; }

    wordsContainer.innerHTML = "";

    for (let i = 1; i <= amount; i++) {
        const textarea = document.createElement("textarea");
        textarea.required = true;

        const prefix = i + ". ";
        textarea.value = prefix;

        textarea.addEventListener("keydown", function (e) {
            if (this.selectionStart <= prefix.length &&
                (e.key === "Backspace" || e.key === "Delete")) {
                e.preventDefault();
            }
        });

        textarea.addEventListener("focus", function () {
            this.setSelectionRange(this.value.length, this.value.length);
        });

        textarea.addEventListener("input", function () {
            const cursorPos = this.selectionStart;
            const before = this.value.substring(0, cursorPos);
            const after = this.value.substring(cursorPos);

            if (before.includes("(_)")) {
                const newBefore = before.replace(/\(_\)/g, "____ ");
                this.value = newBefore + after;
                this.setSelectionRange(newBefore.length, newBefore.length);
            }
        });

        wordsContainer.appendChild(textarea);
    }
});

// DESCRIPTION MODE
const modeRadios = document.querySelectorAll("input[name='mode']");
const descriptionField = document.getElementById("description");

modeRadios.forEach(radio => {
    radio.addEventListener("change", function () {
        if (this.value === "default") {
            descriptionField.value = "Fill in the blanks with the correct missing words.";
            descriptionField.readOnly = true;
        } else {
            descriptionField.value = "";
            descriptionField.readOnly = false;
        }
    });
});

// DATE FORMAT
function formatDateTime(value) {
    if (!value) return "";
    const date = new Date(value);
    return date.toLocaleString('en-GB', {
        weekday: 'long',
        day: 'numeric',
        month: 'long',
        year: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
    });
}

document.getElementById("opens").addEventListener("change", function () {
    document.getElementById("opensFormatted").textContent = formatDateTime(this.value);
});

document.getElementById("closes").addEventListener("change", function () {
    document.getElementById("closesFormatted").textContent = formatDateTime(this.value);
});

// TIME LIMIT
const timeLimitInput = document.getElementById("timeLimit");
const totalTimeDisplay = document.getElementById("totalTime");

timeLimitInput.addEventListener("input", function () {
    const minutes = parseInt(this.value);

    if (isNaN(minutes) || minutes < 0) {
        totalTimeDisplay.textContent = "";
        return;
    }

    if (minutes < 60) {
        totalTimeDisplay.textContent = `${minutes} Minute${minutes !== 1 ? 's' : ''}`;
    } else {
        const hours = Math.floor(minutes / 60);
        const remainingMinutes = minutes % 60;

        totalTimeDisplay.textContent =
            remainingMinutes === 0
            ? `${hours} Hour${hours !== 1 ? 's' : ''}`
            : `${hours} Hour${hours !== 1 ? 's' : ''} : ${remainingMinutes} Minute${remainingMinutes !== 1 ? 's' : ''}`;
    }
});

// PREVIEW
document.querySelector(".preview-btn").addEventListener("click", () => {
    const sentences = [];
    document.querySelectorAll("#wordsContainer textarea").forEach(t => {
        sentences.push(t.value);
    });

    const attemptsSelected = document.querySelector("input[name='attempts']:checked");

    const gradingSelected = [];
    document.querySelectorAll("input[name='grading']:checked").forEach(cb => {
        gradingSelected.push(cb.value);
    });

    alert(
`PREVIEW

Title: ${document.getElementById("title").value}
Description: ${document.getElementById("description").value}
Sentences:
${sentences.join("\n")}
Attempts Allowed: ${attemptsSelected ? attemptsSelected.value : 'Not set'}
Grading Criteria: ${gradingSelected.length ? gradingSelected.join(", ") : 'Not set'}
Time Limit: ${document.getElementById("timeLimit").value} minutes`
    );
});

// SUBMIT
document.querySelector("form").addEventListener("submit", function(e){
    e.preventDefault();

    const attemptsSelected = document.querySelector("input[name='attempts']:checked");

    const gradingSelected = [];
    document.querySelectorAll("input[name='grading']:checked").forEach(cb => {
        gradingSelected.push(cb.value);
    });

    const data = {
        title: document.getElementById("title").value,
        description: document.getElementById("description").value,
        category: document.getElementById("category").value,
        amount: document.getElementById("amount").value,
        timeLimit: document.getElementById("timeLimit").value,
        opens: document.getElementById("opens").value,
        closes: document.getElementById("closes").value,
        attempts: attemptsSelected ? attemptsSelected.value : null,
        grading: gradingSelected,
        sentences: []
    };

    document.querySelectorAll("#wordsContainer textarea").forEach(t => {
        data.sentences.push(t.value);
    });

    console.log("SUBMITTED DATA:", data);
    alert("Form published! Check console.");
});
</script>

</body>
</html>
