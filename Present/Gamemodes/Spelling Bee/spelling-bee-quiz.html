<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Carnival - Spelling Bee</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-main: #333333;
            --text-light: #888888;
            --border-color: #ccc;
        }

        /* BODY */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 40px;
        }

        /* NAVBAR */
        .navbar {
            background-color: #111827;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            color: white;
        }

        .logo img { height: 35px; }

        /* TIMER STYLES */
        .timer-wrapper {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
            padding-right: 20px;
            box-sizing: border-box;
        }

        .timer-container {
            background-color: #ffffff;
            padding: 10px 15px;
            border-radius: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 50px;
        }

        .number { color: #222; font-size: 1.5rem; font-weight: 600; line-height: 1; margin-bottom: 3px; }
        .label { color: #555; font-size: 0.7rem; font-weight: 400; }
        .separator { color: #ccc; font-size: 1rem; padding-bottom: 12px; font-weight: bold; }

        /* QUIZ CARD */
        .test-box {
            padding: 30px;
            width: 700px;
            min-height: 550px;
            margin: 10px auto;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            background-color: white;
            box-sizing: border-box;
        }

        .box-header {
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        /* ITEM ROW */
        .row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .item-number { font-weight: bold; width: 30px; color: #666; }

        .input-container {
            position: relative;
            display: flex;
            align-items: center;
            flex: 1;
        }

        .input-container input {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }

        .input-container i {
            position: absolute;
            right: 10px;
            cursor: pointer;
            color: #2196f3;
            font-size: 20px;
        }

        /* NAVIGATION CONTROLS */
        .nav-controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        button {
            padding: 10px 25px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #2196f3;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.2s;
        }

        button:disabled { background-color: #ccc; cursor: not-allowed; }
        button:hover:not(:disabled) { background-color: #1976d2; }
        #page-info { font-weight: bold; color: #666; }
    </style>
</head>

<body>

<header class="navbar">
    <div class="logo">
        <img src="logo.png" alt="Logo">
        <span>Quiz Carnival</span>
    </div>
</header>

<div class="timer-wrapper">
  <div class="timer-container">
    <div class="time-box">
      <span id="hours" class="number">00</span>
      <span class="label">hours</span>
    </div>
    <div class="separator">:</div>
    <div class="time-box">
      <span id="minutes" class="number">00</span>
      <span class="label">minutes</span>
    </div>
    <div class="separator">:</div>
    <div class="time-box">
      <span id="seconds" class="number">00</span>
      <span class="label">seconds</span>
    </div>
  </div>
</div>

<div class="test-box" id="testBox">
    <div class="box-header">Spelling Bee</div>
    <div class="items-container" id="itemsContainer"></div>
</div>

<div class="nav-controls">
    <button id="prevBtn" onclick="prevPage()" disabled>Previous</button>
    <span id="page-info">Page 1 of 3</span>
    <button id="nextBtn" onclick="nextPage()">Next</button>
</div>

<script>
// TIMER SCRIPT
const countdownDate = new Date().getTime() + (20 * 60 * 1000); 

function updateCountdown() {
    const now = new Date().getTime();
    let timeLeft = countdownDate - now;

    if (timeLeft < 0) {
        clearInterval(interval);
        document.getElementById("hours").innerText = "00";
        document.getElementById("minutes").innerText = "00";
        document.getElementById("seconds").innerText = "00";
        return;
    }

    const h = Math.floor((timeLeft / (1000 * 60 * 60)) % 24);
    const m = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((timeLeft % (1000 * 60)) / 1000);

    document.getElementById("hours").innerText = h.toString().padStart(2,'0');
    document.getElementById("minutes").innerText = m.toString().padStart(2,'0');
    document.getElementById("seconds").innerText = s.toString().padStart(2,'0');
}

const interval = setInterval(updateCountdown, 1000);
updateCountdown();

// QUIZ SCRIPT
let currentPage = 1;
const totalPages = 3;
const itemsPerPage = 10;

function renderPage() {
    const itemsContainer = document.getElementById("itemsContainer");
    itemsContainer.innerHTML = '';

    let start = (currentPage - 1) * itemsPerPage + 1;
    let end = start + itemsPerPage - 1;

    for (let i = start; i <= end; i++) {
        itemsContainer.innerHTML += ` 
            <div class="row">
                <span class="item-number">${i}.</span>
                <div class="input-container">
                    <input type="text" class="input-field" placeholder="Spell here">
                    <i class='bx bx-volume-full'></i>
                </div>
            </div>
        `;
    }

    document.getElementById("page-info").textContent = `Page ${currentPage} of ${totalPages}`;
    document.getElementById("prevBtn").disabled = (currentPage === 1);
    
    const nextBtn = document.getElementById("nextBtn");
    if (currentPage === totalPages) {
        nextBtn.textContent = "Finish";
    } else {
        nextBtn.textContent = "Next";
    }
}

function nextPage() {
    if (currentPage < totalPages) {
        currentPage++;
        renderPage();
    } else {
        alert("Quiz Finished!");
    }
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        renderPage();
    }
}

renderPage();
</script>

</body>
</html>
