<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Carnival - Spelling Test</title>

<style>
:root {
    --bg-color: #ffffff;
    --text-main: #333333;
    --text-light: #888888;
    --border-color: #ccc;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-main);
}

/* NAVBAR */
.navbar {
    background-color: #111827;
    height: 60px;
    display: flex;
    align-items: center;
    padding: 0 20px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.2rem;
    color: white;
}

.logo img {
    height: 35px;
}

/* CONTENT */
.test-box {
    padding: 40px 20px;
}

.row {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 12px 0;
}

.item-number {
    font-size: 18px;
    width: 35px;
}

.input-field {
    flex: 1;
    max-width: 250px;
    padding: 8px 10px;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    font-size: 16px;
    background: transparent;
    outline: none;
}

.input-field::placeholder {
    color: var(--text-light);
}

/* BUTTONS LIKE "START QUIZ" PAGE */
.nav-buttons {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    padding: 0 20px;
}

button {
    padding: 10px 18px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: background 0.2s;
}

/* Primary & Secondary Styles */
.btn-primary { 
    background-color: #007bff; 
    color: white; 
}

.btn-primary:hover { 
    background-color: #0056b3; 
}

.btn-secondary { 
    background-color: #adb5bd; 
    color: #333; 
}

.btn-secondary:hover { 
    background-color: #8e9499; 
}

button:disabled {
    background: #999;
    cursor: not-allowed;
    color: #eee;
}
</style>
</head>

<body>

<header class="navbar">
    <div class="logo">
        <img src="logo.png" alt="Logo">
        <span>Quiz Carnival</span>
    </div>
</header>

<div class="test-box" id="testBox"></div>

<div class="nav-buttons">
    <button onclick="prevPage()" id="prevBtn" class="btn btn-secondary">Previous</button>
    <button onclick="nextPage()" id="nextBtn" class="btn btn-primary">Next</button>
</div>

<script>
let currentPage = 1;
const totalPages = 3;
const itemsPerPage = 10;

function renderPage() {
    const testBox = document.getElementById("testBox");
    testBox.innerHTML = "";

    let start = (currentPage - 1) * itemsPerPage + 1;
    let end = start + itemsPerPage - 1;

    for (let i = start; i <= end; i++) {
        testBox.innerHTML += `
            <div class="row">
                <span class="item-number">${i}.</span>
                <input type="text" class="input-field" placeholder="Spell here">
            </div>
        `;
    }

    // Hide or show Previous button
    const prevBtn = document.getElementById("prevBtn");
    prevBtn.style.display = currentPage === 1 ? "none" : "inline-block";

    // Change Next button to Finish on last page
    const nextBtn = document.getElementById("nextBtn");
    if (currentPage === totalPages) {
        nextBtn.textContent = "Finish";
        nextBtn.disabled = false; // make sure it's clickable
        nextBtn.onclick = () => alert("Quiz Finished!"); // Replace with your finish logic
    } else {
        nextBtn.textContent = "Next";
        nextBtn.disabled = false;
        nextBtn.onclick = nextPage;
    }
}

function nextPage() {
    if (currentPage < totalPages) {
        currentPage++;
        renderPage();
    }
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        renderPage();
    }
}

// initial load
renderPage();
</script>

</body>
</html>
