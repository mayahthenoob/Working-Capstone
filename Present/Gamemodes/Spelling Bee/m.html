<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spelling Bee Settings</title>
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
<style>
:root {
    --bg-glass: rgba(255, 255, 255, 0.2);
    --bg-active: rgba(255, 255, 255, 0.9);
    --blur: blur(20px);
    --dark-color: #2b2b2b;
    --light-color: #f7f7f7;
}

/* Reset */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: linear-gradient(180deg, #b06ab3, #4568dc);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    transition: background 0.3s ease;
}

body.darkmode {
    background: #1a1a1a;
}

/* Main Grid */
.control-center {
    width: 280px; /* Adjusted width to make the player smaller */
    display: grid;
    grid-template-columns: 1fr;
    grid-gap: 25px;
    padding: 20px;
}

/* Music Player */
.widget.music-player {
    background: var(--bg-glass);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    padding: 30px;
    width: 100%; /* Width is now responsive, fits the parent container */
    height: 250px;
}

/* Increased font size for song and artist name */
.widget.music-player div {
    font-size: 18px; /* Increased font size */
    font-weight: bold;
    margin-bottom: 10px;
}

/* Increase size of icons in the player */
.widget.music-player i {
    font-size: 60px; /* Increased icon size */
    cursor: pointer;
    margin: 0 30px; /* Increased space between icons */
}

/* Sliders Container (Vertical Layout for Volume & Brightness) */
.sliders-container {
    display: flex;
    flex-direction: column;
    gap: 25px;
}

/* Wrapper for Horizontal Sliders */
.sliders-wrapper {
    display: flex;
    gap: 20px;
    width: 100%;
}

/* Slider */
.slider-container {
    height: 180px;
    position: relative;
    overflow: hidden;
    background: var(--bg-glass);
    border-radius: 22px;
    backdrop-filter: var(--blur);
    width: 100%;
}

/* Slider Fill */
.slider-fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: var(--bg-active);
    height: 75%;
    transition: height 0.1s ease-out;
}

/* Slider Icon */
.slider-icon {
    position: absolute;
    bottom: 15px;
    width: 100%;
    text-align: center;
    z-index: 2;
    mix-blend-mode: exclusion;
    font-size: 28px;
    color: white;
}

/* Dark Mode Toggle - iOS Style */
.toggle-widget {
    height: 75px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.btn-toggle {
    background-color: rgba(255, 255, 255, 0.2);
    width: 4.5em;
    height: 2.2em;
    border-radius: 2em;
    position: relative;
    display: flex;
    align-items: center;
    cursor: pointer;
    transition: background-color 0.3s ease;
}

.btn-toggle:hover {
    background-color: rgba(255, 255, 255, 0.3);
}

.btn__indicator {
    background-color: #fff;
    width: 2em;
    height: 2em;
    border-radius: 50%;
    position: absolute;
    left: 0.1em;
    top: 0.1em;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: transform 0.3s ease, background-color 0.3s ease;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
}

body.darkmode .btn__indicator {
    transform: translateX(2.3em);
    background-color: var(--dark-color);
}

body.darkmode .btn__icon {
    color: #fff;
}

.animated {
    animation: spin 0.5s;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="control-center">
    <!-- Music Player -->
    <div class="widget music-player">
        <div style="font-size: 14px; opacity: 0.7;">Sleep, Forever</div> 
        <div style="font-size: 18px; margin-bottom: 12px; font-weight: bold;">Madder Rose</div> 
        <div style="display: flex; gap: 30px; align-items: center;"> 
            <i class='bx bx-skip-previous'></i>
            <i class='bx bx-play' id="play-btn"></i>
            <i class='bx bx-skip-next'></i>
        </div>
    </div>

    <!-- Sliders Container -->
    <div class="sliders-container">
        <!-- Sliders Wrapper (Horizontal) -->
        <div class="sliders-wrapper">
            <!-- Brightness Slider -->
            <div class="slider-container" id="bright-container">
                <div class="slider-fill" id="bright-fill" style="height: 75%;"></div>
                <div class="slider-icon"><i class='bx bx-tachometer' id="bright-icon"></i></div>
            </div>

            <!-- Volume Slider -->
            <div class="slider-container" id="vol-container">
                <div class="slider-fill" id="vol-fill" style="height: 75%;"></div>
                <div class="slider-icon">
                    <i class='bx bx-volume-full' id="vol-icon"></i>
                </div>
            </div>

            <!-- Speaker Voice Slider -->
            <div class="slider-container" id="voice-container">
                <div class="slider-fill" id="voice-fill" style="height: 75%;"></div>
                <div class="slider-icon">
                    <i class='bx bx-user-voice' id="voice-icon"></i>
                </div>
            </div>
        </div>

        <!-- Dark Mode Toggle -->
        <div class="toggle-widget">
            <div class="btn-toggle" id="theme-toggle">
                <div class="btn__indicator">
                    <i class="btn__icon bx bx-sun" id="toggle-icon"></i>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
/* --- Theme Toggle Logic --- */
const themeBtn = document.getElementById('theme-toggle');
const toggleIcon = document.getElementById('toggle-icon');
const body = document.body;

themeBtn.addEventListener('click', () => {
    body.classList.toggle('darkmode');
    toggleIcon.classList.add('animated');

    if (body.classList.contains('darkmode')) {
        toggleIcon.classList.replace('bx-sun', 'bx-moon');
    } else {
        toggleIcon.classList.replace('bx-moon', 'bx-sun');
    }

    setTimeout(() => toggleIcon.classList.remove('animated'), 500);
});

/* --- Volume Slider Logic --- */
const volContainer = document.getElementById('vol-container');
const volFill = document.getElementById('vol-fill');
const volIcon = document.getElementById('vol-icon');

function updateVolume(e) {
    const rect = volContainer.getBoundingClientRect();
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    let percentage = ((rect.bottom - y) / rect.height) * 100;
    percentage = Math.max(0, Math.min(100, percentage));
    
    volFill.style.height = percentage + '%';

    if (percentage === 0) {
        volIcon.className = 'bx bx-volume-mute';
    } else if (percentage < 50) {
        volIcon.className = 'bx bx-volume-low';
    } else {
        volIcon.className = 'bx bx-volume-full';
    }
}

/* --- Speaker Voice Slider Logic --- */
const voiceContainer = document.getElementById('voice-container');
const voiceFill = document.getElementById('voice-fill');
const voiceIcon = document.getElementById('voice-icon');

function updateVoice(e) {
    const rect = voiceContainer.getBoundingClientRect();
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    let percentage = ((rect.bottom - y) / rect.height) * 100;
    percentage = Math.max(0, Math.min(100, percentage));
    voiceFill.style.height = percentage + '%';

    if (percentage === 0) {
        voiceIcon.className = 'bx bx-user-voice';  // Same icon, just ensure no change
    } else if (percentage < 50) {
        voiceIcon.className = 'bx bx-user-voice';  // Or any additional classes if needed
    } else {
        voiceIcon.className = 'bx bx-user-voice';
    }
}

let isVoiceDragging = false;
const startVoiceDrag = (e) => { isVoiceDragging = true; updateVoice(e); };
const doVoiceDrag = (e) => { if (isVoiceDragging) updateVoice(e); };
const stopVoiceDrag = () => isVoiceDragging = false;

voiceContainer.addEventListener('mousedown', startVoiceDrag);
window.addEventListener('mousemove', doVoiceDrag);
window.addEventListener('mouseup', stopVoiceDrag);

voiceContainer.addEventListener('touchstart', startVoiceDrag);
window.addEventListener('touchmove', doVoiceDrag);
window.addEventListener('touchend', stopVoiceDrag);

/* --- Brightness Slider Logic --- */
const brightContainer = document.getElementById('bright-container');
const brightFill = document.getElementById('bright-fill');

function updateBrightness(e) {
    const rect = brightContainer.getBoundingClientRect();
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    let percentage = ((rect.bottom - y) / rect.height) * 100;
    percentage = Math.max(0, Math.min(100, percentage));
    brightFill.style.height = percentage + '%';
}

let isBrightDragging = false;
const startBrightDrag = (e) => { isBrightDragging = true; updateBrightness(e); };
const doBrightDrag = (e) => { if (isBrightDragging) updateBrightness(e); };
const stopBrightDrag = () => isBrightDragging = false;

brightContainer.addEventListener('mousedown', startBrightDrag);
window.addEventListener('mousemove', doBrightDrag);
window.addEventListener('mouseup', stopBrightDrag);

brightContainer.addEventListener('touchstart', startBrightDrag);
window.addEventListener('touchmove', doBrightDrag);
window.addEventListener('touchend', stopBrightDrag);

/* --- Play/Pause Toggle Logic --- */
const playBtn = document.getElementById('play-btn');
playBtn.addEventListener('click', () => {
    if (playBtn.classList.contains('bx-play')) {
        playBtn.classList.replace('bx-play', 'bx-pause');
    } else {
        playBtn.classList.replace('bx-pause', 'bx-play');
    }
});
</script>

</body>
</html>
