<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Hangman Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f04e84 0%, #7c3a91 100%);
            padding: 20px;
        }

        .form-container {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 800px;
        }

        h2 {
            margin-top: 0;
            color: #666;
            font-weight: 500;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 14px;
            color: #777;
            margin-bottom: 8px;
        }

        input, textarea {
            padding: 12px;
            border: 1px solid #f2f2f2;
            background-color: #f9f9f9;
            border-radius: 4px;
            font-size: 14px;
            color: #333;
            outline: none;
            width: 100%;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input:focus, textarea:focus {
            border-color: #4a90e2;
        }

        .selection-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 25px;
            margin-top: 10px;
        }

        .selection-option {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #333;
            cursor: pointer;
        }

        .selection-option input {
            width: auto;
            margin: 0;
            cursor: pointer;
        }

        .button-row {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .action-btn {
            border: none;
            padding: 12px 30px;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .preview-btn {
            background-color: #999;
            color: white;
        }

        .preview-btn:hover {
            background-color: #777;
        }

        .publish-btn {
            background-color: #28a745;
            color: white;
        }

        .publish-btn:hover {
            background-color: #1e7e34;
        }

        #wordsContainer {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .formatted-date, .total-time {
            font-size: 14px;
            color: #555;
            margin-top: 6px;
        }

        @media (max-width: 900px) {
            #wordsContainer {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
            .form-container {
                padding: 20px;
            }

            #wordsContainer {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<div class="form-container">
    <h2>Hangman Form</h2>

    <form id="hangmanForm">
        <div class="form-grid">
            <div class="form-group full-width">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" required>
            </div>

            <div class="form-group full-width">
                <label for="description">Description</label>
                <textarea id="description" name="description"></textarea>

                <div class="selection-group">
                    <label class="selection-option">
                        <input type="radio" id="default" name="mode" value="default">
                        Default
                    </label>
                    <label class="selection-option">
                        <input type="radio" id="custom" name="mode" value="custom">
                        Custom
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <input type="text" id="category" name="category" placeholder="Category">
            </div>

            <div class="form-group">
                <label for="amount">Amount</label>
                <input type="number"
                       id="amount"
                       name="amount"
                       placeholder="Amount of Words"
                       min="1"
                       max="32" required>
            </div>

            <div class="form-group full-width">
                <label>Words to Guess</label>
                <div id="wordsContainer"></div>
            </div>

            <!-- UPDATED ATTEMPTS SECTION -->
            <div class="form-group full-width">
                <label>Attempts Allowed</label>
                <div class="selection-group">
                    <label class="selection-option">
                        <input type="radio" name="reattempt" value="1"> 1
                    </label>
                    <label class="selection-option">
                        <input type="radio" name="reattempt" value="2"> 2
                    </label>
                    <label class="selection-option">
                        <input type="radio" name="reattempt" value="3"> 3
                    </label>
                </div>
            </div>

            <div class="form-group full-width">
                <label>Grading Criteria</label>
                <div class="selection-group">
                    <label class="selection-option">
                        <input type="checkbox" name="criteria" value="highest_score"> 
                        Highest Score
                    </label>
                    <label class="selection-option">
                        <input type="checkbox" name="criteria" value="fastest_time"> 
                        Fastest Time
                    </label>
                    <label class="selection-option">
                        <input type="checkbox" name="criteria" value="highest_streak"> 
                        Highest Streak
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="opens">Opens</label>
                <input type="datetime-local" id="opens">
                <div id="opensFormatted" class="formatted-date"></div>
            </div>

            <div class="form-group">
                <label for="closes">Closes</label>
                <input type="datetime-local" id="closes">
                <div id="closesFormatted" class="formatted-date"></div>
            </div>

            <div class="form-group full-width">
                <label for="timeLimit">Time Limit (Minutes)</label>
                <input type="number" id="timeLimit" min="0">
                <div id="totalTime" class="total-time"></div>
            </div>

            <!-- NEW GUESSES SECTION -->
            <div class="form-group full-width">
                <label>Guesses</label>
                <div class="selection-group">
                    <label class="selection-option">
                        <input type="radio" name="guessesMode" value="perWord">
                        Per Word
                    </label>
                    <label class="selection-option">
                        <input type="radio" name="guessesMode" value="entireQuiz">
                        Entire Quiz
                    </label>
                </div>
                <div id="guessesInputContainer" style="margin-top:10px; display:none;">
                    <input type="number" id="guessesInput" min="1" placeholder="Enter number of guesses">
                </div>
            </div>

        </div>

        <div class="button-row">
            <button type="button" class="action-btn preview-btn">Preview</button>
            <button type="submit" class="action-btn publish-btn">Submit</button>
        </div>
    </form>
</div>

<script>
    // WORD GENERATOR
    const amountInput = document.getElementById("amount");
    const wordsContainer = document.getElementById("wordsContainer");

    amountInput.addEventListener("input", function () {
        let amount = parseInt(this.value);
        if (amount > 32) { amount = 32; this.value = 32; }
        if (amount < 1 || isNaN(amount)) { wordsContainer.innerHTML = ""; return; }

        wordsContainer.innerHTML = "";
        for (let i = 1; i <= amount; i++) {
            const input = document.createElement("input");
            input.type = "text";
            input.placeholder = "Word " + i;
            input.required = true;
            wordsContainer.appendChild(input);
        }
    });

    // DESCRIPTION MODE
    const descRadios = document.querySelectorAll("input[name='mode']");
    const descriptionField = document.getElementById("description");

    descRadios.forEach(radio => {
        radio.addEventListener("change", function () {
            if (this.value === "default") {
                descriptionField.value = "Guess the words within the time limit!";
                descriptionField.readOnly = true;
            } else {
                descriptionField.value = "";
                descriptionField.readOnly = false;
            }
        });
    });

    // FORMAT DATES
    function formatDateTime(value) {
        if (!value) return "";
        const date = new Date(value);
        return date.toLocaleString('en-GB', {
            weekday: 'long',
            day: 'numeric',
            month: 'long',
            year: 'numeric',
            hour: 'numeric',
            minute: '2-digit',
            hour12: true
        });
    }

    document.getElementById("opens").addEventListener("change", function () {
        document.getElementById("opensFormatted").textContent = formatDateTime(this.value);
    });

    document.getElementById("closes").addEventListener("change", function () {
        document.getElementById("closesFormatted").textContent = formatDateTime(this.value);
    });

    // TIME LIMIT
    const timeLimitInput = document.getElementById("timeLimit");
    const totalTimeDisplay = document.getElementById("totalTime");

    timeLimitInput.addEventListener("input", function () {
        const minutes = parseInt(this.value);
        if (isNaN(minutes) || minutes < 0) { totalTimeDisplay.textContent = ""; return; }

        if (minutes < 60) {
            totalTimeDisplay.textContent = `${minutes} Minute${minutes !== 1 ? 's' : ''}`;
        } else {
            const hours = Math.floor(minutes / 60);
            const remainingMinutes = minutes % 60;

            totalTimeDisplay.textContent =
                remainingMinutes === 0
                ? `${hours} Hour${hours !== 1 ? 's' : ''}`
                : `${hours} Hour${hours !== 1 ? 's' : ''} : ${remainingMinutes} Minute${remainingMinutes !== 1 ? 's' : ''}`;
        }
    });

    // GUESSES SECTION
    const guessesRadios = document.querySelectorAll("input[name='guessesMode']");
    const guessesInputContainer = document.getElementById("guessesInputContainer");
    const guessesInput = document.getElementById("guessesInput");

    guessesRadios.forEach(radio => {
        radio.addEventListener("change", function () {
            guessesInputContainer.style.display = "block";
            guessesInput.placeholder = 
                this.value === "perWord" 
                ? "Enter guesses per word" 
                : "Enter guesses for entire quiz";
        });
    });

    // PREVIEW
    document.querySelector(".preview-btn").addEventListener("click", () => {
        const words = [];
        document.querySelectorAll("#wordsContainer input").forEach(i => words.push(i.value));
        
        const criteria = [];
        document.querySelectorAll("input[name='criteria']:checked").forEach(c => criteria.push(c.parentNode.textContent.trim()));

        const guessesMode = document.querySelector("input[name='guessesMode']:checked")?.value || '';
        const guessesNumber = guessesInput.value || '';

        const attemptsAllowed = document.querySelector("input[name='reattempt']:checked")?.value || "Not selected";

        alert(
`PREVIEW

Title: ${document.getElementById("title").value}
Description: ${document.getElementById("description").value}
Words: ${words.join(", ") || "None entered"}
Grading: ${criteria.join(", ") || "None selected"}
Time Limit: ${document.getElementById("timeLimit").value || 0} minutes
Attempts Allowed: ${attemptsAllowed}
Guesses: ${guessesMode ? guessesMode + " (" + guessesNumber + ")" : "Not set"}`
        );
    });

    // SUBMIT
    document.getElementById("hangmanForm").addEventListener("submit", function(e){
        e.preventDefault();

        const selectedCriteria = [];
        document.querySelectorAll("input[name='criteria']:checked").forEach(cb => {
            selectedCriteria.push(cb.value);
        });

        const data = {
            title: document.getElementById("title").value,
            description: document.getElementById("description").value,
            category: document.getElementById("category").value,
            amount: document.getElementById("amount").value,
            timeLimit: document.getElementById("timeLimit").value,
            opens: document.getElementById("opens").value,
            closes: document.getElementById("closes").value,
            reattempt: document.querySelector("input[name='reattempt']:checked")?.value || '1',
            gradingCriteria: selectedCriteria,
            words: [],
            guessesMode: document.querySelector("input[name='guessesMode']:checked")?.value || '',
            guessesNumber: guessesInput.value || ''
        };

        document.querySelectorAll("#wordsContainer input").forEach(i => data.words.push(i.value));

        console.log("SUBMITTED DATA:", data);
        alert("Form submitted! Check console for data object.");
    });
</script>

</body>
</html>
