<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Search</title>

<style>
  :root {
    --curious-blue: #2092e9;
    --blush: #cf7486;
    --san-juan: #35556e;
    --tiber: #06382f;
    --cherry-red: #74070e;
    --mulled-wine: #614d70;
    --pesto: #6c7d36;
    --sorbet-orange: #ffa858;
    --forest-green: #3a4b41;
    --soft-jade: #abd1c6;
    --current-color: #ffd166;
    --radical-red: #FF6B6B;
  }

  html, body {
    overflow-x: hidden;
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #fdfdfd;
    display: flex;
    flex-direction: column;
    align-items: center;
    user-select: none;
  }

  .navbar {
    background-color: #111827;
    height: 60px;
    width: 100%;
    display: flex;
    align-items: center;
    padding: 0 20px;
    box-sizing: border-box;
  }

  .navbar span {
    color: white;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.2rem;
  }

  .logo img {
    height: 35px;
  }

  /* Timer Wrapper - Updated to match second website */
  .timer-wrapper {
    width: 100%;
    display: flex;
    justify-content: flex-end; 
    margin-bottom: 20px;
    padding-right: 20px; /* Aligns with the second site's spacing */
    box-sizing: border-box;
  }

  /* Timer Container - Updated to match second website */
  .timer-container {
    background-color: #ffffff;
    padding: 10px 15px;
    border-radius: 10px;
    display: flex;
    gap: 10px;
    align-items: center;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    border: 1px solid #ddd;
    margin-top: 10px;
  }

  .time-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 50px;
  }

  .number {
    color: #222;
    font-size: 1.5rem;
    font-weight: 600;
    line-height: 1;
    margin-bottom: 3px;
  }

  .label {
    color: #555;
    font-size: 0.7rem;
    font-weight: 400;
  }

  .separator {
    color: #ccc;
    font-size: 1rem;
    padding-bottom: 12px;
    font-weight: bold;
  }

  .container {
    background: white;
    border-radius: 20px;
    padding: 60px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    max-width: 700px;
    width: 100%;
    box-sizing: border-box;
    margin-bottom: 40px;
  }

  h1 {
    text-align: center;
    margin-bottom: 30px;
    font-weight: 800;
    letter-spacing: 1px;
    color: #222;
  }

  .game {
    display: flex;
    flex-direction: column; 
    align-items: center;
    gap: 40px; 
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(10, 50px); 
    grid-template-rows: repeat(10, 50px);
    gap: 0; 
    cursor: crosshair;
    position: relative;
    max-width: 100%;
  }

  .cell {
    position: relative;
    width: 50px; 
    height: 50px; 
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    z-index: 2;
    color: #333;
    font-size: 20px; 
  }

  .pill-highlight,
  #temp-pill {
    position: absolute;
    height: 40px;           
    border-radius: 20px;
    pointer-events: none;
    z-index: 1;
    transform-origin: 20px center; 
    margin-top: -20px;      
  }

  .pill-highlight {
    border: 2px solid var(--pill-color);
    background: rgba(0,0,0,0.02);
  }

  #temp-pill {
    border: 2px solid var(--current-color);
    display: none;
  }

  .words {
    text-align: center; 
  }

  .words h3 {
    margin: 0 0 15px;
    font-size: 25px;
    color: #666;
    letter-spacing: 0.5px;
  }

  .words ul {
    list-style: none;
    padding: 0;
    margin: 0;
    column-count: 4; 
    column-gap: 50px; 
  }

  .words li {
    font-weight: 700;
    padding: 4px 0;
    font-size: 15px;
    color: #222;
    transition: all 0.2s;
    break-inside: avoid; 
  }

  .words li.found {
    opacity: 0.3;
    text-decoration: line-through;
  }

  /* Modal Styles */
  .modal {
    width: 450px;
    background: linear-gradient(145deg, #0b1120, #1c2541);
    border: 3px solid #0055ff;
    border-radius: 16px;
    color: #ffffff;
    padding: 30px;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    box-shadow: 0 10px 30px rgba(0, 85, 255, 0.5);
    display: none;
    z-index: 100;
  }

  .content p {
    font-size: 18px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 30px;
  }

  .input-section {
    display: flex;
    justify-content: center;
    gap: 20px;
  }

  .btn {
    background: linear-gradient(145deg, #76ff03, #32cd32);
    color: #ffffff;
    border: none;
    padding: 12px 50px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 12px;
    cursor: pointer;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    box-shadow: 0 5px 0 #4a9e02;
    transition: all 0.2s;
  }

  .btn:hover {
    background: linear-gradient(145deg, #32cd32, #76ff03);
    transform: translateY(-2px);
    box-shadow: 0 7px 0 #4a9e02;
  }

  .btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #4a9e02;
  }
</style>
</head>
<body>

<header class="navbar">
  <div class="logo">
    <img src="logo.png" alt="Quiz Carnival Logo"> 
    <span>Quiz Carnival</span>
  </div>
</header>

<div class="timer-wrapper">
  <div class="timer-container">
    <div class="time-box">
      <span id="hours" class="number">00</span>
      <span class="label">hours</span>
    </div>
    <div class="separator">:</div>
    <div class="time-box">
      <span id="minutes" class="number">00</span>
      <span class="label">minutes</span>
    </div>
    <div class="separator">:</div>
    <div class="time-box">
      <span id="seconds" class="number">00</span>
      <span class="label">seconds</span>
    </div>
  </div>
</div>

<div class="container">
  <h1>WORD SEARCH</h1>
  <div class="game">
    <div class="grid" id="grid">
        <div id="temp-pill"></div>
    </div>
    <div class="words">
      <h3>WORDS TO FIND</h3>
      <ul id="wordList"></ul>
    </div>
  </div>
</div>

<div id="finishModal" class="modal">
    <div class="content">
        <p>You've found all the words! Press <strong>Submit</strong> to submit the quiz or <strong>Continue</strong> to keep interacting.</p>
        <div class="input-section">
            <button id="continueBtn" class="btn">Continue</button>
            <button id="submitBtn" class="btn">Submit</button>
        </div>
    </div>
</div>

<script>
  const countdownDate = new Date().getTime() + (20 * 60 * 1000); 

  function updateCountdown() {
    const now = new Date().getTime();
    let timeLeft = countdownDate - now;

    if (timeLeft < 0) {
      clearInterval(interval);
      document.getElementById("hours").innerText = "00";
      document.getElementById("minutes").innerText = "00";
      document.getElementById("seconds").innerText = "00";
      return;
    }

    const h = Math.floor((timeLeft / (1000 * 60 * 60)) % 24);
    const m = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((timeLeft % (1000 * 60)) / 1000);

    document.getElementById("hours").innerText = h.toString().padStart(2,'0');
    document.getElementById("minutes").innerText = m.toString().padStart(2,'0');
    document.getElementById("seconds").innerText = s.toString().padStart(2,'0');
  }

  const interval = setInterval(updateCountdown, 1000);
  updateCountdown();

  // Word Search Game Logic
  const gridData = [
    "ANGRYSAVRN","XRPETKYENS","RDETICXEEU","FSVDANGERR",
    "FMCCAUASVP","CWAACMNAOR","AWORRIEDUI","LIMEMEEOSS",
    "MTIREDDBIE","SADHAPPYXD"
  ];
  const words = ["ANGRY","HAPPY","SCARED","WORRIED","SURPRISED","NERVOUS","CALM","TIRED","SAD","EXCITED","TED","DANGER"];
  const colors = [
    "var(--curious-blue)","var(--blush)","var(--san-juan)","var(--tiber)",
    "var(--cherry-red)","var(--mulled-wine)","var(--pesto)","var(--sorbet-orange)",
    "var(--forest-green)","var(--soft-jade)","var(--radical-red)"
  ];

  let colorIndex = 0, isSelecting=false, startCell=null, currentSelection={cells:[],angle:0,width:0,left:0,top:0}, wordColors={}, cellsArray=[];
  const grid=document.getElementById("grid"), wordList=document.getElementById("wordList"), tempPill=document.getElementById("temp-pill");

  function buildGrid() {
    gridData.forEach((row,r)=>{
      row.split("").forEach((letter,c)=>{
        const cell=document.createElement("div");
        cell.className="cell";
        cell.textContent=letter;
        cell.dataset.row=r;
        cell.dataset.col=c;
        cell.addEventListener("mousedown",(e)=>{e.preventDefault(); handleStart(cell);});
        cell.addEventListener("mouseenter",()=>handleDrag(cell));
        grid.appendChild(cell);
        cellsArray.push(cell);
      });
    });
  }

  function buildWords() {
    words.forEach(word=>{
      const li=document.createElement("li");
      li.textContent=word;
      li.id=word;
      wordList.appendChild(li);
    });
  }

  function handleStart(cell){
    isSelecting=true;
    startCell=cell;
    const color=colors[colorIndex % colors.length];
    document.documentElement.style.setProperty("--current-color", color);
    tempPill.style.display="block";
    updateSelection(cell);
  }

  function handleDrag(cell){
    if(!isSelecting) return;
    updateSelection(cell);
  }

  document.addEventListener("mouseup",()=>{
    if(!isSelecting) return;
    isSelecting=false;
    checkSelection();
    tempPill.style.display="none";
  });

  function updateSelection(endCell){
    const r1=parseInt(startCell.dataset.row), c1=parseInt(startCell.dataset.col);
    const r2=parseInt(endCell.dataset.row), c2=parseInt(endCell.dataset.col);
    const dr=r2-r1, dc=c2-c1;
    const absDr=Math.abs(dr), absDc=Math.abs(dc);
    if(!(dr===0||dc===0||absDr===absDc)) return;

    const cellSize=50;
    const steps=Math.max(absDr,absDc);
    const actualDist=Math.sqrt(dr*dr+dc*dc)*cellSize;
    const pillWidth=actualDist+40;
    const angle=Math.atan2(dr,dc)*(180/Math.PI);
    const startX=c1*cellSize+(cellSize/2), startY=r1*cellSize+(cellSize/2);

    tempPill.style.width=`${pillWidth}px`;
    tempPill.style.left=`${startX-20}px`;
    tempPill.style.top=`${startY}px`;
    tempPill.style.transform=`rotate(${angle}deg)`;

    currentSelection.width=pillWidth;
    currentSelection.angle=angle;
    currentSelection.left=tempPill.style.left;
    currentSelection.top=tempPill.style.top;
    currentSelection.cells=[];

    const rStep=dr===0?0:dr/absDr, cStep=dc===0?0:dc/absDc;
    for(let i=0;i<=steps;i++){
      const r=r1+i*rStep, c=c1+i*cStep;
      currentSelection.cells.push(cellsArray[r*10+c]);
    }
  }

  function checkSelection(){
    const word=currentSelection.cells.map(c=>c.textContent).join("");
    const reversed=word.split("").reverse().join("");
    const match=words.find(w=>(w===word||w===reversed)&&!wordColors[w]);
    if(match){
      const color=colors[colorIndex % colors.length];
      wordColors[match]=color;
      const pill=document.createElement("div");
      pill.className="pill-highlight";
      pill.style.setProperty("--pill-color", color);
      pill.style.width=`${currentSelection.width}px`;
      pill.style.left=currentSelection.left;
      pill.style.top=currentSelection.top;
      pill.style.transform=`rotate(${currentSelection.angle}deg)`;
      grid.appendChild(pill);

      const li=document.getElementById(match);
      li.classList.add("found");
      li.style.color=color;
      colorIndex++;

      if(words.every(w => wordColors[w])) {
        document.getElementById('finishModal').style.display='block';
      }
    }
  }

  document.getElementById('continueBtn').addEventListener('click', () => {
      document.getElementById('finishModal').style.display = 'none';
  });

  document.getElementById('submitBtn').addEventListener('click', () => {
      alert("Quiz submitted!");
      document.getElementById('finishModal').style.display = 'none';
  });

  buildGrid();
  buildWords();
</script>

</body>
</html>
