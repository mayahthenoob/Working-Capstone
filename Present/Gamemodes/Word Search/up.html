<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .modal {
            width: 450px;
            background-color: #050a14;
            border: 3px solid #0055ff;
            border-radius: 12px;
            color: white;
            padding: 20px;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 85, 255, 0.4);
            text-align: center;
        }

        .content {
            margin-top: 10px;
        }

        .content p {
            font-size: 18px;
            font-weight: bold;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .input-section {
            padding: 20px;
            border-radius: 8px;
        }

        .btn {
            background-color: #76ff03;
            color: white;
            border: none;
            padding: 10px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            box-shadow: 0 4px 0px #4a9e02;
            transition: transform 0.1s;
            margin: 10px;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0px #4a9e02;
        }
    </style>
</head>
<body>

    <div class="modal">
        <div class="content">
            <p>Press Submit to Submit Quiz and Continue to Continue to Interact with Quiz</p>

            <div class="input-section">
                <button class="btn">Continue</button>
                <button class="btn">Submit</button>
            </div>
        </div>
    </div>

</body>
</html>
