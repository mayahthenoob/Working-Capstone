<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Search Gameplay</title>
<style>
    :root { --curious-blue: #2092e9; --current-color: #ffd166; }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #fdfdfd; display: flex; flex-direction: column; align-items: center; user-select: none; }
    .navbar { background-color: #111827; height: 60px; width: 100%; display: flex; align-items: center; padding: 0 20px; color: white; }
    .timer-container { margin: 20px; padding: 10px 20px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-size: 1.5rem; font-weight: bold; }
    .grid { display: grid; grid-template-columns: repeat(10, 50px); grid-template-rows: repeat(10, 50px); position: relative; border: 2px solid #333; }
    .cell { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 20px; border: 0.1px solid #eee; z-index: 2; }
    .pill-highlight, #temp-pill { position: absolute; height: 35px; border-radius: 20px; pointer-events: none; z-index: 1; transform-origin: 17.5px center; margin-top: -17.5px; opacity: 0.6; }
    #temp-pill { background: var(--current-color); display: none; }
    .words-box { margin-top: 30px; text-align: center; }
    .words-box ul { list-style: none; padding: 0; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
    .found { text-decoration: line-through; opacity: 0.4; }
    .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111827; color: white; padding: 40px; border-radius: 15px; display: none; z-index: 100; text-align: center; }
</style>
</head>
<body>

<header class="navbar">Quiz Carnival - Word Search</header>
<div class="timer-container" id="timer">00:00</div>

<div class="grid" id="grid">
    <div id="temp-pill"></div>
</div>

<div class="words-box">
    <h3>FIND THESE WORDS:</h3>
    <ul id="wordList"></ul>
</div>

<div id="finishModal" class="modal">
    <h2>Puzzle Complete!</h2>
    <button onclick="location.href='index.html'" style="padding:10px 20px; cursor:pointer;">Create New Quiz</button>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const gridData = params.get("grid") ? params.get("grid").split(",") : [];
    const words = params.get("words") ? params.get("words").split(",") : [];
    const timeLimit = parseInt(params.get("limit")) || 5;

    // Timer Logic
    let secondsLeft = timeLimit * 60;
    const timerDisplay = document.getElementById("timer");
    const countdown = setInterval(() => {
        const m = Math.floor(secondsLeft / 60);
        const s = secondsLeft % 60;
        timerDisplay.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        if (--secondsLeft < 0) { clearInterval(countdown); alert("Time is up!"); }
    }, 1000);

    // Game Variables
    let isSelecting = false, startCell = null, wordColors = {};
    const grid = document.getElementById("grid"), wordList = document.getElementById("wordList"), tempPill = document.getElementById("temp-pill");

    // Initialize
    function init() {
        gridData.forEach((row, r) => {
            row.split("").forEach((char, c) => {
                const cell = document.createElement("div");
                cell.className = "cell";
                cell.textContent = char;
                cell.dataset.row = r; cell.dataset.col = c;
                cell.onmousedown = (e) => { e.preventDefault(); isSelecting = true; startCell = cell; tempPill.style.display="block"; };
                cell.onmouseenter = () => { if(isSelecting) updateSelection(cell); };
                grid.appendChild(cell);
            });
        });

        words.forEach(w => {
            const li = document.createElement("li");
            li.textContent = w; li.id = "word-" + w;
            wordList.appendChild(li);
        });
    }

    function updateSelection(endCell) {
        const r1 = parseInt(startCell.dataset.row), c1 = parseInt(startCell.dataset.col);
        const r2 = parseInt(endCell.dataset.row), c2 = parseInt(endCell.dataset.col);
        const dr = r2 - r1, dc = c2 - c1;
        if (!(dr === 0 || dc === 0 || Math.abs(dr) === Math.abs(dc))) return;

        const dist = Math.sqrt(dr*dr + dc*dc) * 50;
        tempPill.style.width = (dist + 35) + "px";
        tempPill.style.left = (c1 * 50 + 25 - 17.5) + "px";
        tempPill.style.top = (r1 * 50 + 25) + "px";
        tempPill.style.transform = `rotate(${Math.atan2(dr, dc) * 180 / Math.PI}deg)`;
    }

    window.onmouseup = () => {
        if (!isSelecting) return;
        isSelecting = false;
        tempPill.style.display = "none";
        // Simple logic: In a real app, you'd check which letters were covered.
        // For this demo, we assume the user finds a word if they highlight correctly.
        checkWord();
    };

    function checkWord() {
        // Validation logic would go here. 
        // If correct:
        // document.getElementById("word-ANGRY").classList.add("found");
    }

    init();
</script>
</body>
</html>
