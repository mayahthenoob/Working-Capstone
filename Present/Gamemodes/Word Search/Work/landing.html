<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Quiz</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; margin: 0; }
        .navbar { background-color: #111827; height: 60px; display: flex; align-items: center; padding: 0 20px; color: white; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .btn { padding: 10px 18px; border: none; border-radius: 4px; cursor: pointer; transition: 0.2s; margin-right: 10px; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-secondary { background-color: #adb5bd; }
    </style>
</head>
<body>
    <header class="navbar">Quiz Carnival</header>
    <main class="container">
        <h1 id="qTitle">Quiz Title</h1>
        <section id="qDates">
            <p>Opened: <span id="openDate"></span></p>
            <p>Closes: <span id="closeDate"></span></p>
        </section>
        <section style="margin-top:40px">
            <p>Attempts allowed: <span id="qAttempts"></span></p>
            <p id="qDesc"></p>
            <p>Category: <span id="qCat"></span></p>
            <p>Time limit: <span id="qTime"></span> mins</p>
        </section>
        <footer style="margin-top:40px">
            <button class="btn btn-secondary" onclick="history.back()">Back</button>
            <button class="btn btn-primary" onclick="location.href='game.html'">Start Quiz</button>
        </footer>
    </main>
    <script>
        const data = JSON.parse(localStorage.getItem("quizData"));
        if(data) {
            document.getElementById("qTitle").textContent = data.title;
            document.getElementById("openDate").textContent = data.opens || "Always Open";
            document.getElementById("closeDate").textContent = data.closes || "No Deadline";
            document.getElementById("qAttempts").textContent = data.attempts;
            document.getElementById("qDesc").textContent = data.description;
            document.getElementById("qCat").textContent = data.category;
            document.getElementById("qTime").textContent = data.timeLimit;
        }
    </script>
</body>
</html>
