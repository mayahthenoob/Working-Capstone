<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Word Puzzle Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #f04e84 0%, #7c3a91 100%);
    padding: 20px;
}

.form-container {
    background-color: white;
    padding: 40px;
    border-radius: 8px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 900px;
}

h2 {
    margin-top: 0;
    color: #666;
    font-weight: 500;
    margin-bottom: 30px;
    text-align: center;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group.full-width {
    grid-column: span 2;
}

label {
    font-size: 14px;
    color: #777;
    margin-bottom: 8px;
}

input, textarea {
    padding: 12px;
    border: 1px solid #f2f2f2;
    background-color: #f9f9f9;
    border-radius: 4px;
    font-size: 14px;
    color: #333;
    outline: none;
    width: 100%;
}

textarea {
    resize: vertical;
    min-height: 100px;
}

input:focus, textarea:focus {
    border-color: #4a90e2;
}

.radio-group {
    display: flex;
    align-items: center;
    gap: 30px;
    margin-top: 12px;
}

.reattempt-group .radio-group {
    margin-top: 4px;
}

.radio-option {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #333;
}

.radio-option label {
    margin: 0;
    cursor: pointer;
}

.radio-option input[type="radio"] {
    margin: 0;
    transform: translateY(1px);
    cursor: pointer;
    width: auto;
}

.button-row {
    display: flex;
    justify-content: space-between;
    margin-top: 30px;
}

.action-btn {
    border: none;
    padding: 12px 30px;
    border-radius: 4px;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.preview-btn {
    background-color: #999;
    color: white;
}

.preview-btn:hover {
    background-color: #777;
}

.publish-btn {
    background-color: #28a745;
    color: white;
}

.publish-btn:hover {
    background-color: #1e7e34;
}

#wordsContainer {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

.formatted-date, .total-time {
    font-size: 14px;
    color: #555;
    margin-top: 6px;
}

.grid-design {
    display: grid;
    grid-template-columns: repeat(10, 40px);
    grid-template-rows: repeat(10, 40px);
    gap: 2px;
    border: 1px solid #ccc;
    margin-top: 10px;
    justify-content: center;
}

.grid-design .cell {
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    background-color: #f9f9f9;
    border: 1px solid #ddd;
    cursor: text;
    user-select: text;
    font-size: 18px;
    overflow: hidden;
    line-height: 1;
    outline: none;
}

.grid-design .cell:focus {
    border-color: #4a90e2;
    background-color: #fff;
}

/* Preview Modal */
.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal-overlay.active {
    display: flex;
}

.modal-box {
    background: white;
    border-radius: 10px;
    padding: 30px;
    max-width: 500px;
    width: 90%;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    position: relative;
}

.modal-box h3 {
    margin-top: 0;
    font-size: 1.4rem;
    color: #333;
}

.modal-box p {
    font-size: 0.95rem;
    color: #555;
    margin: 8px 0;
}

.modal-close {
    position: absolute;
    top: 12px;
    right: 16px;
    font-size: 1.4rem;
    cursor: pointer;
    color: #999;
    border: none;
    background: none;
}

.modal-close:hover { color: #333; }

.preview-grid {
    display: grid;
    grid-template-columns: repeat(10, 28px);
    grid-template-rows: repeat(10, 28px);
    gap: 1px;
    margin: 15px 0;
    border: 1px solid #ddd;
    justify-content: center;
}

.preview-grid .pcell {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: bold;
    background: #f9f9f9;
    border: 1px solid #eee;
    color: #333;
}

.preview-words {
    font-size: 13px;
    color: #444;
    margin-top: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.preview-words span {
    background: #f0f0f0;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
}

@media (max-width: 900px) {
    #wordsContainer { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full-width { grid-column: span 1; }
    .form-container { padding: 20px; }
    #wordsContainer { grid-template-columns: 1fr; }
    .button-row { flex-direction: column; gap: 10px; }
    .grid-design {
        grid-template-columns: repeat(10, 30px);
        grid-template-rows: repeat(10, 30px);
    }
}
</style>
</head>

<body>

<div class="form-container">
<h2>Word Search Form</h2>

<form id="puzzleForm">
<div class="form-grid">

<div class="form-group full-width">
<label for="title">Title</label>
<input type="text" id="title" name="title" required>
</div>

<div class="form-group full-width">
<label for="description">Description</label>
<textarea id="description" name="description"></textarea>

<div class="radio-group">
<div class="radio-option">
<input type="radio" id="default" name="mode" value="default">
<label for="default">Default</label>
</div>
<div class="radio-option">
<input type="radio" id="custom" name="mode" value="custom">
<label for="custom">Custom</label>
</div>
</div>
</div>

<div class="form-group">
<label for="category">Category</label>
<input type="text" id="category" name="category">
</div>

<div class="form-group">
<label for="amount">Amount</label>
<input type="number" id="amount" name="amount" min="1" max="12" required>
</div>

<div class="form-group full-width">
<label>Words to Find</label>
<div id="wordsContainer"></div>
</div>

<div class="form-group full-width">
<label>Word Search Design Mode</label>
<div class="radio-group">
    <div class="radio-option">
        <input type="radio" id="modeCustom" name="designMode" value="custom" checked>
        <label for="modeCustom">Custom</label>
    </div>
    <div class="radio-option">
        <input type="radio" id="modeDefault" name="designMode" value="default">
        <label for="modeDefault">Default (auto-fill)</label>
    </div>
</div>
<div id="designGrid" class="grid-design"></div>
</div>

<div class="form-group full-width reattempt-group">
<label>Attempts Allowed</label>
<div class="radio-group">
  <div class="radio-option">
    <input type="radio" name="reattempt" value="none">
    <label>None</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="reattempt" value="one">
    <label>One</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="reattempt" value="two">
    <label>Two</label>
  </div>
  <div class="radio-option">
    <input type="radio" name="reattempt" value="three">
    <label>Three</label>
  </div>
</div>
</div>

<div class="form-group">
<label for="opens">Opens</label>
<input type="datetime-local" id="opens" name="opens">
<div id="opensFormatted" class="formatted-date"></div>
</div>

<div class="form-group">
<label for="closes">Closes</label>
<input type="datetime-local" id="closes" name="closes">
<div id="closesFormatted" class="formatted-date"></div>
</div>

<div class="form-group full-width">
<label for="timeLimit">Time Limit (Minutes)</label>
<input type="number" id="timeLimit" min="0" placeholder="Enter minutes">
<div id="totalTime" class="total-time"></div>
</div>

</div>

<div class="button-row">
<button type="button" class="action-btn preview-btn" id="previewBtn">Preview</button>
<button type="button" class="action-btn publish-btn" id="publishBtn">Publish</button>
</div>

</form>
</div>

<!-- Preview Modal -->
<div class="modal-overlay" id="previewModal">
  <div class="modal-box">
    <button class="modal-close" id="closeModal">&#x2715;</button>
    <h3 id="previewTitle">—</h3>
    <p id="previewMeta"></p>
    <div class="preview-grid" id="previewGrid"></div>
    <div class="preview-words" id="previewWords"></div>
  </div>
</div>

<script>
// ------------------------
// Words to Find Uppercase
// ------------------------
const amountInput = document.getElementById("amount");
const wordsContainer = document.getElementById("wordsContainer");

amountInput.addEventListener("input", function () {
    let amount = parseInt(this.value);
    if (amount > 12) { amount = 12; this.value = 12; }
    if (amount < 1 || isNaN(amount)) { wordsContainer.innerHTML = ""; return; }

    wordsContainer.innerHTML = "";
    for (let i = 1; i <= amount; i++) {
        const input = document.createElement("input");
        input.type = "text";
        input.placeholder = "Word " + i;
        input.required = true;
        input.classList.add("word-input");

        input.addEventListener("input", () => {
            input.value = input.value.toUpperCase().replace(/[^A-Z]/g, '');
        });

        wordsContainer.appendChild(input);
    }
});

// ------------------------
// Description default/custom
// ------------------------
const defaultRadio = document.getElementById("default");
const customRadio = document.getElementById("custom");
const descriptionField = document.getElementById("description");

defaultRadio.addEventListener("change", function () {
    if (this.checked) {
        descriptionField.value = "This is a word search puzzle that should be completed in the allotted time";
        descriptionField.readOnly = true;
    }
});
customRadio.addEventListener("change", function () {
    if (this.checked) {
        descriptionField.value = "";
        descriptionField.readOnly = false;
    }
});

// ------------------------
// Format Opens/Closes
// ------------------------
function formatDateTime(value) {
    if (!value) return "";
    const date = new Date(value);
    return date.toLocaleString('en-GB', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
        hour: 'numeric', minute: '2-digit', hour12: true
    });
}

const opensInput = document.getElementById("opens");
const closesInput = document.getElementById("closes");

opensInput.addEventListener("change", function () {
    document.getElementById("opensFormatted").textContent = formatDateTime(this.value);
});
closesInput.addEventListener("change", function () {
    document.getElementById("closesFormatted").textContent = formatDateTime(this.value);
});

// ------------------------
// Time Limit display
// ------------------------
const timeLimitInput = document.getElementById("timeLimit");
const totalTimeDisplay = document.getElementById("totalTime");

timeLimitInput.addEventListener("input", function () {
    const minutes = parseInt(this.value);
    if (isNaN(minutes) || minutes < 0) { totalTimeDisplay.textContent = ""; return; }
    if (minutes < 60) {
        totalTimeDisplay.textContent = `${minutes} Minute${minutes !== 1 ? 's' : ''}`;
    } else {
        const hours = Math.floor(minutes / 60);
        const rem = minutes % 60;
        if (rem === 0) {
            totalTimeDisplay.textContent = `${hours} Hour${hours !== 1 ? 's' : ''}`;
        } else {
            totalTimeDisplay.textContent = `${hours} Hour${hours !== 1 ? 's' : ''} : ${rem} Minute${rem !== 1 ? 's' : ''}`;
        }
    }
});

// ------------------------
// Word Search Design Grid
// ------------------------
const designGrid = document.getElementById("designGrid");
const gridSize = 10;
let designMode = "custom";

function focusCell(r, c) {
    const target = designGrid.querySelector(`.cell[data-row='${r}'][data-col='${c}']`);
    if (target) {
        target.focus();
        const range = document.createRange();
        const sel = window.getSelection();
        range.selectNodeContents(target);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
    }
}

for (let r = 0; r < gridSize; r++) {
    for (let c = 0; c < gridSize; c++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.dataset.row = r;
        cell.dataset.col = c;
        cell.contentEditable = true;
        cell.style.textAlign = "center";

        cell.addEventListener("input", (e) => {
            let char = cell.textContent.toUpperCase().replace(/[^A-Z]/g, '');
            char = char.charAt(0) || "";
            cell.textContent = char;
            const range = document.createRange();
            const sel = window.getSelection();
            range.selectNodeContents(cell);
            range.collapse(false);
            sel.removeAllRanges();
            sel.addRange(range);
            if (char.length > 0) {
                if (c < gridSize - 1) focusCell(r, c + 1);
                else if (r < gridSize - 1) focusCell(r + 1, 0);
            }
        });

        cell.addEventListener("keydown", (e) => {
            switch (e.key) {
                case "ArrowUp": e.preventDefault(); focusCell(Math.max(0, r - 1), c); break;
                case "ArrowDown": e.preventDefault(); focusCell(Math.min(gridSize - 1, r + 1), c); break;
                case "ArrowLeft": e.preventDefault(); focusCell(r, Math.max(0, c - 1)); break;
                case "ArrowRight": e.preventDefault(); focusCell(r, Math.min(gridSize - 1, c + 1)); break;
                case "Backspace":
                    if (cell.textContent.length > 0) {
                        cell.textContent = "";
                    } else {
                        e.preventDefault();
                        let prevR = r, prevC = c - 1;
                        if (prevC < 0) {
                            if (r > 0) { prevR = r - 1; prevC = gridSize - 1; } else return;
                        }
                        const prevCell = designGrid.querySelector(`.cell[data-row='${prevR}'][data-col='${prevC}']`);
                        if (prevCell) { prevCell.textContent = ""; focusCell(prevR, prevC); }
                    }
                    break;
                default:
                    if (e.key.length === 1 && !e.key.match(/[a-zA-Z]/)) e.preventDefault();
            }
        });

        cell.addEventListener("paste", (e) => {
            e.preventDefault();
            let pasteText = (e.clipboardData || window.clipboardData).getData('text');
            pasteText = pasteText.toUpperCase().replace(/[^A-Z]/g, '');
            let currR = r, currC = c;
            for (let char of pasteText) {
                const target = designGrid.querySelector(`.cell[data-row='${currR}'][data-col='${currC}']`);
                if (!target) break;
                target.textContent = char;
                if (currC < gridSize - 1) currC++;
                else if (currR < gridSize - 1) { currC = 0; currR++; }
                else break;
            }
            focusCell(currR, currC);
        });

        designGrid.appendChild(cell);
    }
}

const modeCustomRadio = document.getElementById("modeCustom");
const modeDefaultRadio = document.getElementById("modeDefault");

modeDefaultRadio.addEventListener("change", () => {
    if (modeDefaultRadio.checked) {
        designMode = "default";
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        designGrid.querySelectorAll(".cell").forEach(cell => {
            if (!cell.textContent.trim()) {
                cell.textContent = letters.charAt(Math.floor(Math.random() * letters.length));
            }
        });
    }
});
modeCustomRadio.addEventListener("change", () => { if (modeCustomRadio.checked) designMode = "custom"; });

// ------------------------
// Collect Grid Data
// ------------------------
function getGridData() {
    const gridData = [];
    for (let r = 0; r < gridSize; r++) {
        const row = [];
        for (let c = 0; c < gridSize; c++) {
            row.push(designGrid.querySelector(`.cell[data-row='${r}'][data-col='${c}']`).textContent || "");
        }
        gridData.push(row);
    }
    return gridData;
}

function getWords() {
    return Array.from(document.querySelectorAll(".word-input"))
        .map(i => i.value.trim())
        .filter(w => w.length > 0);
}

function getAttemptsLabel(val) {
    const map = { none: 0, one: 1, two: 2, three: 3 };
    return map[val] !== undefined ? map[val] : val;
}

// ------------------------
// Preview Button
// ------------------------
document.getElementById("previewBtn").addEventListener("click", () => {
    const title = document.getElementById("title").value || "Untitled";
    const category = document.getElementById("category").value;
    const timeLimit = document.getElementById("timeLimit").value;
    const opens = opensInput.value;
    const closes = closesInput.value;
    const attempts = document.querySelector('input[name="reattempt"]:checked');
    const gridData = getGridData();
    const words = getWords();

    document.getElementById("previewTitle").textContent = title;

    let meta = [];
    if (category) meta.push(`Category: ${category}`);
    if (timeLimit) meta.push(`Time limit: ${timeLimit} min`);
    if (opens) meta.push(`Opens: ${formatDateTime(opens)}`);
    if (closes) meta.push(`Closes: ${formatDateTime(closes)}`);
    if (attempts) meta.push(`Attempts: ${attempts.value}`);
    document.getElementById("previewMeta").innerHTML = meta.join(" &nbsp;·&nbsp; ");

    // Build mini preview grid
    const pg = document.getElementById("previewGrid");
    pg.innerHTML = "";
    gridData.forEach(row => {
        row.forEach(letter => {
            const cell = document.createElement("div");
            cell.className = "pcell";
            cell.textContent = letter;
            pg.appendChild(cell);
        });
    });

    // Words list
    const pw = document.getElementById("previewWords");
    pw.innerHTML = "";
    words.forEach(w => {
        const span = document.createElement("span");
        span.textContent = w;
        pw.appendChild(span);
    });

    document.getElementById("previewModal").classList.add("active");
});

document.getElementById("closeModal").addEventListener("click", () => {
    document.getElementById("previewModal").classList.remove("active");
});
document.getElementById("previewModal").addEventListener("click", (e) => {
    if (e.target === document.getElementById("previewModal"))
        document.getElementById("previewModal").classList.remove("active");
});

// ------------------------
// Publish → Save & Redirect
// ------------------------
document.getElementById("publishBtn").addEventListener("click", () => {
    const title = document.getElementById("title").value;
    if (!title) { alert("Please enter a title."); return; }

    const gridData = getGridData();
    const words = getWords();
    if (words.length === 0) { alert("Please add at least one word."); return; }

    const attempts = document.querySelector('input[name="reattempt"]:checked');
    const attemptsVal = attempts ? attempts.value : "none";
    const attemptsNum = { none: 0, one: 1, two: 2, three: 3 }[attemptsVal] ?? 0;

    const timeLimit = parseInt(document.getElementById("timeLimit").value) || 0;
    const opens = opensInput.value;
    const closes = closesInput.value;
    const category = document.getElementById("category").value;
    const description = descriptionField.value;

    const puzzleData = {
        title,
        description,
        category,
        timeLimit,
        opens: opens ? formatDateTime(opens) : null,
        closes: closes ? formatDateTime(closes) : null,
        attemptsAllowed: attemptsNum,
        words,
        gridData
    };

    localStorage.setItem("puzzleData", JSON.stringify(puzzleData));
    window.location.href = "start.html";
});
</script>

</body>
</html>
