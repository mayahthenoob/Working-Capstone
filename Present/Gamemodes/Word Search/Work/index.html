<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Word Puzzle Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; padding: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #f04e84 0%, #7c3a91 100%); padding: 20px; }
        .form-container { background-color: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 900px; }
        h2 { margin-top: 0; color: #666; font-weight: 500; margin-bottom: 30px; text-align: center; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: span 2; }
        label { font-size: 14px; color: #777; margin-bottom: 8px; }
        input, textarea { padding: 12px; border: 1px solid #f2f2f2; background-color: #f9f9f9; border-radius: 4px; font-size: 14px; color: #333; outline: none; width: 100%; }
        textarea { resize: vertical; min-height: 100px; }
        input:focus, textarea:focus { border-color: #4a90e2; }
        .radio-group { display: flex; align-items: center; gap: 30px; margin-top: 12px; }
        .radio-option { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #333; }
        .button-row { display: flex; justify-content: space-between; margin-top: 30px; }
        .action-btn { border: none; padding: 12px 30px; border-radius: 4px; font-size: 15px; cursor: pointer; transition: 0.3s; }
        .preview-btn { background-color: #999; color: white; }
        .publish-btn { background-color: #28a745; color: white; }
        #wordsContainer { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .grid-design { display: grid; grid-template-columns: repeat(10, 40px); grid-template-rows: repeat(10, 40px); gap: 2px; border: 1px solid #ccc; margin-top: 10px; }
        .grid-design .cell { display: flex; align-items: center; justify-content: center; font-weight: bold; background-color: #f9f9f9; border: 1px solid #ddd; cursor: text; font-size: 18px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .form-group.full-width { grid-column: span 1; } .grid-design { grid-template-columns: repeat(10, 30px); grid-template-rows: repeat(10, 30px); } }
    </style>
</head>
<body>
<div class="form-container">
    <h2>Word Search Form</h2>
    <form id="quizForm">
        <div class="form-grid">
            <div class="form-group full-width"><label for="title">Title</label><input type="text" id="title" required></div>
            <div class="form-group full-width">
                <label for="description">Description</label>
                <textarea id="description"></textarea>
                <div class="radio-group">
                    <div class="radio-option"><input type="radio" id="default" name="mode" value="default"><label for="default">Default</label></div>
                    <div class="radio-option"><input type="radio" id="custom" name="mode" value="custom"><label for="custom">Custom</label></div>
                </div>
            </div>
            <div class="form-group"><label for="category">Category</label><input type="text" id="category"></div>
            <div class="form-group"><label for="amount">Amount</label><input type="number" id="amount" min="1" max="12" required></div>
            <div class="form-group full-width"><label>Words to Find</label><div id="wordsContainer"></div></div>
            <div class="form-group full-width">
                <label>Word Search Design Mode</label>
                <div class="radio-group">
                    <div class="radio-option"><input type="radio" id="modeCustom" name="designMode" value="custom" checked><label for="modeCustom">Custom</label></div>
                    <div class="radio-option"><input type="radio" id="modeDefault" name="designMode" value="default"><label for="modeDefault">Default (auto-fill)</label></div>
                </div>
                <div id="designGrid" class="grid-design"></div>
            </div>
            <div class="form-group full-width">
                <label>Attempts Allowed</label>
                <div class="radio-group">
                    <input type="radio" name="reattempt" value="None" checked> None
                    <input type="radio" name="reattempt" value="1"> 1
                    <input type="radio" name="reattempt" value="2"> 2
                    <input type="radio" name="reattempt" value="3"> 3
                </div>
            </div>
            <div class="form-group"><label>Opens</label><input type="datetime-local" id="opens"><div id="opensFormatted"></div></div>
            <div class="form-group"><label>Closes</label><input type="datetime-local" id="closes"><div id="closesFormatted"></div></div>
            <div class="form-group full-width"><label>Time Limit (Minutes)</label><input type="number" id="timeLimit" value="20"></div>
        </div>
        <div class="button-row">
            <button type="button" class="action-btn preview-btn" onclick="saveAndGo('landing.html')">Preview</button>
            <button type="button" class="action-btn publish-btn" onclick="saveAndGo('landing.html')">Publish</button>
        </div>
    </form>
</div>

<script>
    const amountInput = document.getElementById("amount");
    const wordsContainer = document.getElementById("wordsContainer");
    const designGrid = document.getElementById("designGrid");

    amountInput.addEventListener("input", function() {
        wordsContainer.innerHTML = "";
        for (let i = 1; i <= Math.min(this.value, 12); i++) {
            const input = document.createElement("input");
            input.placeholder = "Word " + i;
            input.addEventListener("input", () => input.value = input.value.toUpperCase().replace(/[^A-Z]/g, ''));
            wordsContainer.appendChild(input);
        }
    });

    for (let r = 0; r < 10; r++) {
        for (let c = 0; c < 10; c++) {
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.contentEditable = true;
            cell.dataset.row = r; cell.dataset.col = c;
            cell.addEventListener("input", (e) => {
                cell.textContent = cell.textContent.toUpperCase().replace(/[^A-Z]/g, '').charAt(0);
                if(cell.textContent) {
                    let next = designGrid.querySelector(`[data-row="${c===9?r+1:r}"][data-col="${c===9?0:c+1}"]`);
                    if(next) next.focus();
                }
            });
            designGrid.appendChild(cell);
        }
    }

    function saveAndGo(url) {
        const gridData = [];
        for(let r=0; r<10; r++) {
            let row = "";
            for(let c=0; c<10; c++) {
                row += designGrid.querySelector(`[data-row="${r}"][data-col="${c}"]`).textContent || "X";
            }
            gridData.push(row);
        }
        const data = {
            title: document.getElementById("title").value || "Untitled Quiz",
            description: document.getElementById("description").value,
            category: document.getElementById("category").value || "General",
            attempts: document.querySelector('input[name="reattempt"]:checked').value,
            opens: document.getElementById("opens").value,
            closes: document.getElementById("closes").value,
            timeLimit: document.getElementById("timeLimit").value,
            words: Array.from(wordsContainer.querySelectorAll('input')).map(i => i.value).filter(v => v),
            grid: gridData
        };
        localStorage.setItem("quizData", JSON.stringify(data));
        window.location.href = url;
    }
</script>
</body>
</html>
