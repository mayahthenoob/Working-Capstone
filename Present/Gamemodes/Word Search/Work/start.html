<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Quiz</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            line-height: 1.6;
        }

        .navbar {
            background-color: #111827;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .navbar span {
            color: white;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
        }

        .logo img {
            height: 35px;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        h1 { 
            font-size: 2rem; 
            margin-bottom: 40px;
        }

        .quiz-dates, .quiz-details {
            font-size: 0.95rem;
        }

        .quiz-dates {
            margin-bottom: 40px;
        }

        .quiz-details {
            margin-top: 40px;
        }

        hr { 
            border: 0; 
            border-top: 1px solid #eee; 
            margin: 20px 0; 
        }

        .actions {
            margin-top: 40px;
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            align-items: center;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .btn-primary { 
            background-color: #007bff; 
            color: white; 
        }

        .btn-primary:hover { 
            background-color: #0056b3; 
        }

        .btn-secondary { 
            background-color: #adb5bd; 
            color: #333; 
        }

        .btn-secondary:hover { 
            background-color: #8e9499; 
        }

        .no-data {
            color: #999;
            font-style: italic;
        }
    </style>
</head>

<body>

    <header class="navbar">
        <div class="logo">
            <img src="logo.png" alt="Quiz Carnival Logo"> 
            <span>Quiz Carnival</span>
        </div>
    </header>

    <main class="container">
        <h1 id="quizTitle">Quiz</h1>

        <section class="quiz-dates">
            <p id="opensLine"></p>
            <p id="closesLine"></p>
        </section>

        <section class="quiz-details">
            <p id="attemptsLine"></p>
            <p id="descriptionLine"></p>
            <p id="categoryLine"></p>
            <p id="timeLimitLine"></p>
            <p>Grading method: Highest grade</p>
        </section>

        <footer class="actions">
            <button class="btn btn-secondary" onclick="goBack()">Back to the course</button>
            <button class="btn btn-primary" onclick="startQuiz()">Start Quiz</button>
        </footer>
    </main>

    <script>
        function goBack() {
            window.location.href = "create.html";
        }

        function startQuiz() {
            window.location.href = "quiz.html";
        }

        function formatAttempts(n) {
            if (n === 0) return "No attempts allowed";
            return `${n} attempt${n !== 1 ? 's' : ''} allowed`;
        }

        window.onload = () => {
            const raw = localStorage.getItem("puzzleData");
            if (!raw) {
                document.getElementById("quizTitle").textContent = "No puzzle found";
                document.querySelector(".quiz-details").innerHTML = '<p class="no-data">Please create a puzzle first.</p>';
                return;
            }

            const data = JSON.parse(raw);

            document.getElementById("quizTitle").textContent = data.title || "Quiz";
            document.getElementById("opensLine").textContent = data.opens ? `Opened: ${data.opens}` : "";
            document.getElementById("closesLine").textContent = data.closes ? `Closes: ${data.closes}` : "";
            document.getElementById("attemptsLine").textContent = formatAttempts(data.attemptsAllowed ?? 0);
            document.getElementById("descriptionLine").textContent = data.description || "";
            document.getElementById("categoryLine").textContent = data.category ? `Category: ${data.category}` : "";

            if (data.timeLimit) {
                const mins = data.timeLimit;
                if (mins < 60) {
                    document.getElementById("timeLimitLine").textContent = `Time limit: ${mins} min${mins !== 1 ? 's' : ''}`;
                } else {
                    const h = Math.floor(mins / 60), m = mins % 60;
                    document.getElementById("timeLimitLine").textContent = `Time limit: ${h}h${m > 0 ? ` ${m}m` : ''}`;
                }
            }
        };
    </script>

</body>
</html>
