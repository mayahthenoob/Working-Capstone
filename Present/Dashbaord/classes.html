<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Classes</title>

    <!-- Icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #333;
            background-color: #ffffff;
            margin: 0;
            padding: 40px;
            line-height: 1.5;
        }

        .page-wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header h1 {
            font-size: 28px;
            color: #1d2125;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .search-bar {
            display: flex;
            border: 1px solid #ced4da;
            border-radius: 10px;
            overflow: hidden;
            width: 380px;
            height: 38px;
        }

        .search-bar input {
            border: none;
            padding: 8px 12px;
            flex-grow: 1;
            outline: none;
            font-size: 14px;
        }

        .filter-btn {
            background-color: transparent;
            border: 1px solid #ced4da;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
        }

        .filter-btn i {
            font-size: 20px;
            color: #333;
        }

        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card-container {
            width: 100%;
            height: 200px;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            background-size: cover;
            background-position: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: flex-end;
            text-decoration: none;
            color: inherit;
            transition: transform 0.3s ease;
        }

        .card-container:hover {
            transform: translateY(-5px);
        }

        .card-container::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.1));
        }

        .card-content {
            position: relative;
            padding: 20px;
            color: white;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.3s ease;
            width: 100%;
        }

        .card-container:hover .card-content {
            opacity: 1;
            transform: translateY(0);
        }

        .card-content h3 {
            font-size: 18px;
            margin: 0 0 4px 0;
            font-weight: 700;
        }

        .card-content p {
            font-size: 13px;
            margin: 0;
            opacity: 0.9;
        }

        .btn-visit {
            display: inline-block;
            border: 2px solid white;
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 12px;
            margin-top: 10px;
            color: white;
        }

        .btn-visit:hover {
            background: white;
            color: #111;
        }
    </style>
</head>

<body>

<div class="page-wrapper">

    <header class="page-header">
        <h1>Quiz Carnival Available Classes</h1>
    </header>

    <main>

        <div class="top-bar">
            <div class="search-bar">
                <input type="text" placeholder="Search classes">
            </div>

            <button class="filter-btn">
                <i class='bx bx-filter-alt'></i>
            </button>
        </div>

        <!-- ✅ CLASS CARDS ADDED HERE -->
        <div class="classes-grid">

            <a href="#" class="card-container"
               style="background-image: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=400');">
                <div class="card-content">
                    <h3>Agriculture Science</h3>
                    <p>D. St.Louis</p>
                    <span class="btn-visit">Visit</span>
                </div>
            </a>

            <a href="#" class="card-container"
               style="background-image: url('https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&q=80&w=400');">
                <div class="card-content">
                    <h3>General Science</h3>
                    <p>C. Williams</p>
                    <span class="btn-visit">Visit</span>
                </div>
            </a>

            <a href="#" class="card-container"
               style="background-image: url('https://images.unsplash.com/photo-1587620962725-abab7fe55159?auto=format&fit=crop&q=80&w=400');">
                <div class="card-content">
                    <h3>Mathematics</h3>
                    <p>Mr. Darell Mason</p>
                    <span class="btn-visit">Visit</span>
                </div>
            </a>

            <a href="#" class="card-container"
               style="background-image: url('https://images.unsplash.com/photo-1587620962725-abab7fe55159?auto=format&fit=crop&q=80&w=400');">
                <div class="card-content">
                    <h3>Mathematics</h3>
                    <p>Mr. Darell Mason</p>
                    <span class="btn-visit">Visit</span>
                </div>
            </a>

            <a href="#" class="card-container"
               style="background-image: url('https://images.unsplash.com/photo-1587620962725-abab7fe55159?auto=format&fit=crop&q=80&w=400');">
                <div class="card-content">
                    <h3>Mathematics</h3>
                    <p>Mr. Darell Mason</p>
                    <span class="btn-visit">Visit</span>
                </div>
            </a>

            <a href="#" class="card-container"
               style="background-image: url('https://images.unsplash.com/photo-1587620962725-abab7fe55159?auto=format&fit=crop&q=80&w=400');">
                <div class="card-content">
                    <h3>Mathematics</h3>
                    <p>Mr. Darell Mason</p>
                    <span class="btn-visit">Visit</span>
                </div>
            </a>

        </div>

    </main>

</div>

</body>
</html>
