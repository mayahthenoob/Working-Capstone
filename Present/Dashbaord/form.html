<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Carnival - Profile Setup</title>

<style>
* {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    margin: 0;
    background: #f5f5f5;
}

/* NAVBAR */
.navbar {
    background: #111827;
    color: white;
    padding: 15px 20px;
    font-weight: bold;
}

/* CONTAINER */
.container {
    max-width: 1000px;
    margin: 30px auto;
    background: white;
    padding: 30px;
    border-radius: 8px;
}

/* FORM */
.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.full-width {
    grid-column: span 2;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 5px;
}

textarea { min-height: 80px; }

button {
    padding: 12px 25px;
    border: none;
    background: #2563eb;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #1e40af;
}

/* PROFILE */
.profile {
    display: none;
}

.profile.active {
    display: block;
}

.name {
    font-size: 26px;
    font-weight: bold;
}

.section {
    margin-top: 20px;
}

.class-item {
    color: #2563eb;
    margin-bottom: 5px;
}
</style>
</head>

<body>

<div class="navbar">Quiz Carnival</div>

<!-- FORM PAGE -->
<div class="container" id="formPage">
<h2>Create Profile</h2>

<form id="profileForm">
<div class="form-grid">

<div class="full-width">
<label>Name</label>
<input type="text" id="name" required>
</div>

<div>
<label>Role</label>
<select id="role">
<option>Student</option>
<option>Teacher</option>
<option>Admin</option>
</select>
</div>

<div>
<label>Country</label>
<input type="text" id="country">
</div>

<div class="full-width">
<label>Bio</label>
<textarea id="bio"></textarea>
</div>

<div>
<label>Email</label>
<input type="email" id="email">
</div>

<div>
<label>Phone</label>
<input type="text" id="phone">
</div>

<div class="full-width">
<label>Address</label>
<textarea id="address"></textarea>
</div>

<div class="full-width">
<label>Social Links (comma separated)</label>
<input type="text" id="socials">
</div>

<div class="full-width">
<label>Classes (comma separated)</label>
<input type="text" id="classes">
</div>

<div class="full-width">
<label>Certificates (image URLs, comma separated)</label>
<input type="text" id="certificates">
</div>

</div>

<br>
<button type="submit">Save Profile</button>
</form>
</div>

<!-- PROFILE PAGE -->
<div class="container profile" id="profilePage">

<h2 class="name"></h2>
<p class="role"></p>

<div class="section">
<strong>Bio:</strong>
<p id="bioText"></p>
</div>

<div class="section">
<strong>Contact:</strong>
<p id="contact"></p>
</div>

<div class="section">
<strong>Classes:</strong>
<ul id="classList"></ul>
</div>

<div class="section">
<strong>Certificates:</strong>
<div id="certContainer"></div>
</div>

<br>
<button onclick="editProfile()">Edit Profile</button>

</div>

<script>
// SAVE DATA
document.getElementById("profileForm").addEventListener("submit", function(e){
    e.preventDefault();

    const data = {
        name: name.value,
        role: role.value,
        country: country.value,
        bio: bio.value,
        email: email.value,
        phone: phone.value,
        address: address.value,
        socials: socials.value.split(","),
        classes: classes.value.split(","),
        certificates: certificates.value.split(",")
    };

    localStorage.setItem("profileData", JSON.stringify(data));
    loadProfile();
});

// LOAD PROFILE
function loadProfile() {
    const data = JSON.parse(localStorage.getItem("profileData"));
    if (!data) return;

    document.getElementById("formPage").style.display = "none";
    document.getElementById("profilePage").classList.add("active");

    document.querySelector(".name").textContent = data.name;
    document.querySelector(".role").textContent = data.role;

    document.getElementById("bioText").textContent = data.bio;

    document.getElementById("contact").innerHTML =
        `${data.email}<br>${data.phone}<br>${data.address}`;

    // Classes
    const classList = document.getElementById("classList");
    classList.innerHTML = "";
    data.classes.forEach(c => {
        if (c.trim()) {
            const li = document.createElement("li");
            li.className = "class-item";
            li.textContent = c.trim();
            classList.appendChild(li);
        }
    });

    // Certificates
    const certContainer = document.getElementById("certContainer");
    certContainer.innerHTML = "";
    data.certificates.forEach(img => {
        if (img.trim()) {
            const image = document.createElement("img");
            image.src = img.trim();
            image.style.width = "120px";
            image.style.margin = "5px";
            certContainer.appendChild(image);
        }
    });
}

// EDIT BUTTON
function editProfile() {
    document.getElementById("formPage").style.display = "block";
    document.getElementById("profilePage").classList.remove("active");
}

// LOAD ON START
loadProfile();
</script>

</body>
</html>
