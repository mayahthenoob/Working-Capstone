<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar {
            background-color: #111827;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .navbar span {
            color: white;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
        }

        .logo img {
            height: 35px;
        }
    </style>
</head>

<body>

    <header class="navbar">
        <div class="logo">
            <img src="logo.png" alt="Quiz Carnival Logo"> 
            <span>Quiz Carnival</span>
        </div>
    </header>

</body>
</html>
