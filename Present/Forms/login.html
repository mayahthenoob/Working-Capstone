<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Quiz Carnival</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* Using a high-res beach background */
            background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Glassmorphism Effect */
        .login-card {
            background: rgba(255, 255, 255, 0.9); /* Clean semi-white */
            backdrop-filter: blur(10px); /* Blurs the background image behind the card */
            padding: 2.5rem 2rem;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 360px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .logo-container {
            margin-bottom: 1.5rem;
        }

        /* Temporary style for logo if image is missing */
        .logo-container img {
            max-width: 160px;
            height: auto;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.1));
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        input[type="text"], 
        input[type="password"] {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            background-color: #fff;
            box-sizing: border-box; /* Ensures padding doesn't break width */
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.2);
        }

        .login-btn {
            background-color: #0056b3; 
            color: #ffffff;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            background-color: #004494;
            transform: translateY(-1px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .form-footer {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #555;
        }

        .form-footer p {
            margin-bottom: 0.5rem;
        }

        .signup-link {
            color: #0056b3;
            text-decoration: none;
            font-weight: 700;
        }

        .signup-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <img src="logo.png" alt="Quiz Carnival">
        </div>

        <form action="#" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="login-btn">Log in</button>
        </form>

        <div class="form-footer">
             <p>Haven't created an account yet?</p> 
             <a href="#" class="signup-link">Sign Up</a>
        </div>
    </div>

</body>
</html>
