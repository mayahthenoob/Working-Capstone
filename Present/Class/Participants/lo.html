<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathematics | Quiz Carnival</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        :root {
            --primary-blue: #3498db;
            --bg-light: #f4f7f6;
            --border-color: #d1d5db;
            --text-main: #333;
            --text-muted: #7f8c8d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            color: var(--text-main);
        }

        /* NAVBAR */
        .main-nav {
            background: #fff;
            border-bottom: 1px solid var(--border-color);
            padding: 12px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        nav a {
            text-decoration: none;
            color: #4b5563;
            margin-right: 15px;
            font-weight: 500;
        }

        /* CONTAINER */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 { font-size: 2rem; }

        /* TABS */
        .tabs-container {
            display: flex;
            gap: 0;
            position: relative;
            z-index: 2;
        }

        .tab-btn {
            background-color: #f8f9fa;
            border: 1px solid #ccc;
            padding: 10px 15px;
            cursor: pointer;
            color: var(--text-muted);
            border-radius: 8px 8px 0 0;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: 5px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background-color: white;
            color: var(--primary-blue);
            font-weight: bold;
            border-bottom: 1px solid white;
            margin-bottom: -1px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* CARDS */
        .card {
            background: white;
            border: 1px solid #ccc;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-bottom: 15px;
        }

        .connected-card { border-top-left-radius: 0; }

        .card-header {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
            gap: 8px;
        }

        .card-header h2 { margin: 0 8px; flex-grow: 1; font-size: 1rem; }

        .arrow-circle {
            width: 28px; height: 28px;
            background-color: #ecf0f1;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.3s ease;
        }

        .collapsible-wrapper {
            overflow: hidden;
            transition: max-height 0.5s ease;
        }

        .card-body { padding: 15px 20px; }

        /* ITEM ROWS & STRIPS */
        .week-strip {
            color: white; padding: 8px 15px;
            display: flex; align-items: center; gap: 8px;
            font-weight: 600; margin: 10px 15px; border-radius: 8px;
        }
        .strip-purple { background-color: #8e44ad; }
        .strip-green { background-color: #27ae60; }

        .item-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 15px; border: 1px solid transparent;
            border-radius: 8px; margin: 8px 15px; background-color: #fff;
            transition: border 0.3s ease;
        }
        .item-row:hover { border: 1px solid var(--primary-blue); }

        .todo-btn {
            background: transparent; border: 1px solid #ccc;
            color: #2e7d32; padding: 4px 10px; border-radius: 4px;
            font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; gap: 5px;
        }

        /* PARTICIPANTS SPECIFIC */
        .filter-panel {
            background: #fafafa; border: 1px solid #eee;
            border-radius: 12px; padding: 15px; margin-bottom: 20px; display: none;
        }
        .alphabet-row { margin-bottom: 10px; }
        .alphabet-row label { font-size: 10px; font-weight: bold; color: var(--text-muted); display: block; margin-bottom: 4px; }
        .letters { display: flex; flex-wrap: wrap; gap: 3px; }
        .letter-btn {
            padding: 2px 6px; font-size: 10px; background: white; border: 1px solid #ccc; border-radius: 4px; cursor: pointer;
        }
        .letter-btn.active { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; background: #f8f9fa; padding: 12px; border-bottom: 2px solid #eee; font-size: 0.9rem; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }

        .timestamp { color: #e67e22; font-family: monospace; margin-bottom: 15px; }
        .time { font-size: 1.5rem; }
    </style>
</head>
<body>

<header class="main-nav">
    <nav>
        <a href="#">Home</a>
        <a href="#">Dashboard</a>
        <a href="#">Courses</a>
    </nav>
</header>

<div class="container">
    <h1>Mathematics</h1>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="openTab(event, 'class-tab')">
            <i class='bx bx-book'></i> Class
        </button>
        <button class="tab-btn" onclick="openTab(event, 'participants-tab')">
            <i class='bx bx-male-female'></i> Participants
        </button>
        <button class="tab-btn" onclick="openTab(event, 'grades-tab')">
            <i class='bx bx-bar-chart-alt-2'></i> Grades
        </button>
    </div>

    <div id="class-tab" class="tab-content active">
        <section class="card connected-card">
            <div class="card-header">
                <div class="arrow-circle" id="gen-arrow" onclick="toggleSection('gen-wrapper')">
                    <i class='bx bx-chevron-down'></i>
                </div>
                <h2>General Information</h2>
            </div>
            <div class="collapsible-wrapper" id="gen-wrapper">
                <div class="card-body">
                    <div class="timestamp">
                        <span id="date"></span><br>
                        <span class="time" id="time"></span>
                    </div>
                    <p><strong>Instructor:</strong> Mr. Darell Mason</p>
                    <p><strong>Email:</strong> DarellM@gss.edu.gd</p>
                </div>
            </div>
        </section>

        <section class="card">
            <div class="card-header">
                <div class="arrow-circle" id="week1-arrow" onclick="toggleSection('week1-wrapper')">
                    <i class='bx bx-chevron-down'></i>
                </div>
                <h2>Course Content</h2>
            </div>
            <div class="collapsible-wrapper" id="week1-wrapper">
                <div class="week-strip strip-purple">Quizzes</div>
                <div class="item-row">
                    <span><i class='bx bx-pencil'></i> Quiz 1: Algebra Basics</span>
                    <button class="todo-btn">To Do</button>
                </div>
            </div>
        </section>
    </div>

    <div id="participants-tab" class="tab-content">
        <section class="card connected-card">
            <div class="card-header">
                <h2 style="flex-grow: 1;">Participants Management</h2>
                <button class="todo-btn" id="toggleFilterBtn" style="color: var(--primary-blue);">
                    <i class='bx bx-filter-alt'></i> Filter
                </button>
            </div>
            
            <div class="card-body">
                <div class="filter-panel" id="filterPanel">
                    <div style="display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;">
                        <select id="matchType" style="padding: 5px; border-radius: 4px;">
                            <option value="all">Match All</option>
                            <option value="any">Match Any</option>
                        </select>
                        <select id="searchField" style="padding: 5px; border-radius: 4px;">
                            <option value="name">Name</option>
                            <option value="role">Role</option>
                            <option value="group">Group</option>
                        </select>
                        <input type="text" id="filter-input" placeholder="Search..." style="flex-grow: 1; padding: 5px; border-radius: 4px; border: 1px solid #ccc;">
                    </div>

                    <div class="alphabet-row">
                        <label>FIRST NAME</label>
                        <div class="letters" id="first-name-letters">
                            <button class="letter-btn active" data-letter="all">All</button>
                        </div>
                    </div>
                    <div class="alphabet-row">
                        <label>LAST NAME</label>
                        <div class="letters" id="last-name-letters">
                            <button class="letter-btn active" data-letter="all">All</button>
                        </div>
                    </div>

                    <div style="text-align: right; margin-top: 10px;">
                        <button class="todo-btn" id="reset-filters-btn" style="display: inline-block;">Reset</button>
                        <button class="todo-btn" id="apply-filters-btn" style="display: inline-block; background: var(--primary-blue); color: white; border-color: var(--primary-blue);">Apply Filters</button>
                    </div>
                </div>

                <input type="text" id="participantsSearch" placeholder="Quick search names..." style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 10px;">
                <p id="results-count" style="font-size: 0.8rem; color: var(--text-muted);">Calculating...</p>

                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Role</th>
                            <th>Group</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="participantsList"></tbody>
                </table>
            </div>
        </section>
    </div>

    <div id="grades-tab" class="tab-content">
        <section class="card connected-card">
            <div class="card-header"><h2>Grade Overview</h2></div>
            <div class="card-body">
                <table>
                    <tr><td>Quiz 1</td><td style="color: #27ae60;">Completed</td><td>95/100</td></tr>
                </table>
            </div>
        </section>
    </div>
</div>

<script>
    // CLOCK
    function updateClock() {
        const now = new Date();
        document.getElementById("date").textContent = now.toDateString();
        document.getElementById("time").textContent = now.toLocaleTimeString();
    }
    setInterval(updateClock, 1000); updateClock();

    // TAB LOGIC
    function openTab(evt, tabId) {
        document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabId).classList.add("active");
        evt.currentTarget.classList.add("active");
        if(tabId === 'class-tab') refreshHeights();
    }

    // COLLAPSE LOGIC
    const state = {'gen-wrapper': false, 'week1-wrapper': false};
    function toggleSection(id) {
        const wrapper = document.getElementById(id);
        const arrow = document.getElementById(id.replace('-wrapper', '-arrow'));
        if (!state[id]) {
            wrapper.style.maxHeight = "0px";
            arrow.style.transform = "rotate(-90deg)";
        } else {
            wrapper.style.maxHeight = wrapper.scrollHeight + "px";
            arrow.style.transform = "rotate(0deg)";
        }
        state[id] = !state[id];
    }
    function refreshHeights() {
        Object.keys(state).forEach(id => {
            const el = document.getElementById(id);
            if (!state[id]) el.style.maxHeight = el.scrollHeight + "px";
        });
    }

    // PARTICIPANTS DATA
    const participantsData = [
        { name: "Joe Doe", role: "Student", group: "IT1A", status: "online" },
        { name: "Jhon Els", role: "Student", group: "IT1B", status: "recent" },
        { name: "Darell Mason", role: "Teacher", group: "Faculty", status: "online" },
        { name: "Alex Dolla", role: "Student", group: "IT1C", status: "online" },
        { name: "Maria Lee", role: "Student", group: "IT1A", status: "recent" },
        { name: "Kevin Smith", role: "Student", group: "IT1B", status: "never" }
    ];

    function renderParticipants(data) {
        const list = document.getElementById('participantsList');
        document.getElementById('results-count').textContent = `${data.length} participants found`;
        list.innerHTML = data.map(p => `
            <tr>
                <td><i class='bx bx-user' style="margin-right:8px; color: #3498db;"></i>${p.name}</td>
                <td>${p.role}</td>
                <td>${p.group}</td>
                <td><span class="status-dot" style="background:${p.status==='online'?'#27ae60':p.status==='recent'?'#e67e22':'#e74c3c'}"></span>${p.status}</td>
            </tr>
        `).join('');
    }

    function setupAlphabet(containerId) {
        const container = document.getElementById(containerId);
        'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l => {
            const btn = document.createElement('button');
            btn.textContent = l; btn.className = 'letter-btn';
            btn.onclick = () => {
                container.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
            container.appendChild(btn);
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        setupAlphabet('first-name-letters');
        setupAlphabet('last-name-letters');
        renderParticipants(participantsData);
        refreshHeights();

        document.getElementById('toggleFilterBtn').onclick = () => {
            const p = document.getElementById('filterPanel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        };

        document.getElementById('participantsSearch').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            renderParticipants(participantsData.filter(p => p.name.toLowerCase().includes(val)));
        };

        document.getElementById('apply-filters-btn').onclick = () => {
            const matchAll = document.getElementById('matchType').value === 'all';
            const field = document.getElementById('searchField').value;
            const key = document.getElementById('filter-input').value.toLowerCase();
            const firstL = document.querySelector('#first-name-letters .active').textContent;
            const lastL = document.querySelector('#last-name-letters .active').textContent;

            const filtered = participantsData.filter(p => {
                const names = p.name.split(' ');
                const mKey = key === "" || String(p[field]).toLowerCase().includes(key);
                const mF = firstL === 'All' || names[0].startsWith(firstL);
                const mL = lastL === 'All' || (names[1] || "").startsWith(lastL);
                return matchAll ? (mKey && mF && mL) : (mKey || mF || mL);
            });
            renderParticipants(filtered);
        };
    });
</script>
</body>
</html>
