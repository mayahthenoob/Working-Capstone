<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathematics | Quiz Carnival</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #3498db;
            --dark-blue: #004fb0;
            --border: #d1d5db;
            --bg-light: #f4f7f6;
            --text-gray: #4b5563;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            color: #333;
        }

        /* NAVBAR */
        .main-nav {
            background: #fff;
            border-bottom: 1px solid #d1d5db;
            padding: 12px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        nav a {
            text-decoration: none;
            color: var(--text-gray);
            margin-right: 15px;
            font-weight: 500;
        }

        /* CONTAINER */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 { font-size: 2rem; }

        /* TABS */
        .tabs-container {
            display: flex;
            gap: 0;
            position: relative;
            z-index: 2;
        }

        .tab-btn {
            background-color: #f8f9fa;
            border: 1px solid #ccc;
            padding: 10px 15px;
            cursor: pointer;
            color: #7f8c8d;
            border-radius: 8px 8px 0 0;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: 5px;
        }

        .tab-btn.active {
            background-color: white;
            color: var(--primary-blue);
            font-weight: bold;
            border-bottom: 1px solid white;
            margin-bottom: -1px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* CARD STYLE */
        .card {
            background: white;
            border: 1px solid #ccc;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-bottom: 15px;
        }

        .connected-card { border-top-left-radius: 0; }

        .card-header {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
            gap: 8px;
        }

        .card-header h2 { margin: 0 8px; flex-grow: 1; font-size: 1rem; }

        /* PARTICIPANTS INTERFACE OVERRIDES */
        .filter-panel {
            display: none;
            padding: 20px;
            background: #fff;
            border-bottom: 1px solid #eee;
        }
        .filter-panel.show { display: block; }

        .search-container { position: relative; padding: 15px; background: #fafafa; border-bottom: 1px solid #eee; }
        .search-container input {
            width: 100%;
            padding: 10px 10px 10px 40px;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
        }
        .search-icon { position: absolute; left: 25px; top: 25px; color: #aaa; }

        .alphabet-row { display: flex; align-items: center; margin-top: 10px; gap: 10px; }
        .alphabet-row label { font-size: 10px; font-weight: 700; width: 70px; color: #666; }
        
        .letters { display: flex; flex-wrap: wrap; border: 1px solid #eee; border-radius: 4px; }
        .letters button {
            background: white; border: none; border-right: 1px solid #eee;
            padding: 4px 6px; font-size: 10px; cursor: pointer; color: var(--primary-blue);
        }
        .letters button.active { background: var(--primary-blue); color: white; }

        .participants-item {
            display: flex; padding: 12px 20px; border-bottom: 1px solid #f5f5f5;
            align-items: center; font-size: 14px;
        }
        .participants-item > div { flex: 1; }
        .avatar { width: 30px; height: 30px; border-radius: 50%; overflow: hidden; margin-right: 10px; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-left: 5px; }
        .status-online { background: #22c55e; }
        .status-recent { background: #ffcc00; }
        .status-never  { background: #ff4d4d; }

        /* UTILS */
        .collapse-text { color: var(--primary-blue); cursor: pointer; font-size: 0.85rem; }
        .arrow-circle { width: 28px; height: 28px; background-color: #ecf0f1; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .collapsible-wrapper { overflow: hidden; transition: max-height 0.5s ease; }
        .card-body { padding: 15px 20px; }
    </style>
</head>
<body>

<header class="main-nav">
    <nav>
        <a href="#">Home</a>
        <a href="#">Dashboard</a>
        <a href="#">Courses</a>
    </nav>
</header>

<div class="container">
    <h1>Mathematics</h1>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="openTab(event, 'class-tab')">
            <i class='bx bx-book'></i> Class
        </button>
        <button class="tab-btn" onclick="openTab(event, 'participants-tab')">
            <i class='bx bx-male-female'></i> Participants
        </button>
        <button class="tab-btn" onclick="openTab(event, 'grades-tab')">
            <i class='bx bx-bar-chart-alt-2'></i> Grades
        </button>
    </div>

    <div id="class-tab" class="tab-content active">
        <section class="card connected-card">
            <div class="card-header">
                <div class="arrow-circle" onclick="toggleSection('gen-wrapper')">
                    <i class='bx bx-chevron-down'></i>
                </div>
                <h2>General Information</h2>
            </div>
            <div class="collapsible-wrapper" id="gen-wrapper">
                <div class="card-body">
                    <div><strong>Instructor:</strong> Mr. Darell Mason</div>
                    <div><strong>Email:</strong> DarellM@gss.edu.gd</div>
                </div>
            </div>
        </section>
    </div>

    <div id="participants-tab" class="tab-content">
        <section class="card connected-card">
            <div class="card-header">
                <div class="arrow-circle" id="toggleFilterBtn">
                    <i class='bx bx-filter-alt'></i>
                </div>
                <h2>Participant Management</h2>
                <span id="results-count" style="font-size: 0.8rem; color: #888;"></span>
            </div>

            <div class="filter-panel" id="filterPanel">
                <div style="display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;">
                    <select id="searchField" style="padding: 5px; border-radius: 4px;">
                        <option value="name">Name</option>
                        <option value="role">Role</option>
                        <option value="group">Group</option>
                    </select>
                    <input type="text" id="filter-input" placeholder="Keyword..." style="flex-grow: 1; padding: 5px; border: 1px solid #ccc; border-radius: 4px;">
                </div>
                
                <div class="alphabet-row">
                    <label>FIRST NAME</label>
                    <div class="letters" id="first-name-letters"><button class="active" data-letter="all">All</button></div>
                </div>
                <div class="alphabet-row">
                    <label>LAST NAME</label>
                    <div class="letters" id="last-name-letters"><button class="active" data-letter="all">All</button></div>
                </div>

                <div style="margin-top: 15px; text-align: right;">
                    <button id="reset-filters-btn" style="padding: 5px 15px; cursor: pointer;">Reset</button>
                    <button id="apply-filters-btn" style="padding: 5px 15px; background: var(--primary-blue); color: white; border: none; border-radius: 4px; cursor: pointer;">Apply</button>
                </div>
            </div>

            <div class="search-container">
                <span class="search-icon"><i class='bx bx-search'></i></span>
                <input type="text" id="quickSearch" placeholder="Quick search by name...">
            </div>

            <div id="participantsList"></div>
        </section>
    </div>

    <div id="grades-tab" class="tab-content">
        <section class="card connected-card">
            <div class="card-header"><h2>Grade Overview</h2></div>
            <div class="card-body">
                <p>Grades will be updated upon quiz completion.</p>
            </div>
        </section>
    </div>
</div>

<script>
    const participantsData = [
        { id: 1, name: "Joe Doe", avatar: "https://randomuser.me/api/portraits/men/1.jpg", role: "Student", group: "IT1A", status: "online" },
        { id: 2, name: "Jhon Els", avatar: "https://randomuser.me/api/portraits/men/2.jpg", role: "Student", group: "IT1B", status: "recent" },
        { id: 3, name: "Darell Mason", avatar: "https://randomuser.me/api/portraits/men/3.jpg", role: "Teacher", group: "", status: "online" },
        { id: 4, name: "Alex Dolla", avatar: "https://randomuser.me/api/portraits/women/4.jpg", role: "Student", group: "IT1C", status: "online" },
        { id: 5, name: "Maria Lee", avatar: "https://randomuser.me/api/portraits/women/5.jpg", role: "Student", group: "IT1A", status: "recent" },
        { id: 6, name: "Kevin Smith", avatar: "https://randomuser.me/api/portraits/men/6.jpg", role: "Student", group: "IT1B", status: "never" }
    ];

    function openTab(evt, tabId) {
        document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabId).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function renderParticipants(data) {
        const list = document.getElementById('participantsList');
        document.getElementById('results-count').textContent = `(${data.length} found)`;
        list.innerHTML = data.map(p => `
            <div class="participants-item">
                <div style="display:flex; align-items:center; flex: 1.5;">
                    <div class="avatar"><img src="${p.avatar}"></div>
                    <strong>${p.name}</strong>
                </div>
                <div>${p.role}</div>
                <div>${p.group || "N/A"}</div>
                <div>${p.status} <span class="status-dot status-${p.status}"></span></div>
            </div>
        `).join('');
    }

    function setupAlphabet(containerId) {
        const container = document.getElementById(containerId);
        'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l => {
            const btn = document.createElement('button');
            btn.textContent = l;
            btn.dataset.letter = l;
            btn.onclick = () => {
                container.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
            container.appendChild(btn);
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        setupAlphabet('first-name-letters');
        setupAlphabet('last-name-letters');
        renderParticipants(participantsData);

        const filterPanel = document.getElementById('filterPanel');
        document.getElementById('toggleFilterBtn').onclick = () => filterPanel.classList.toggle('show');

        document.getElementById('quickSearch').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            renderParticipants(participantsData.filter(p => p.name.toLowerCase().includes(val)));
        };

        document.getElementById('apply-filters-btn').onclick = () => {
            const keyword = document.getElementById('filter-input').value.toLowerCase();
            const field = document.getElementById('searchField').value;
            const fLet = document.querySelector('#first-name-letters .active').dataset.letter;
            const lLet = document.querySelector('#last-name-letters .active').dataset.letter;

            const filtered = participantsData.filter(p => {
                const [f, l] = p.name.split(' ');
                const matchKeyword = p[field].toLowerCase().includes(keyword);
                const matchFirst = fLet === 'all' || f.startsWith(fLet);
                const matchLast = lLet === 'all' || (l && l.startsWith(lLet));
                return matchKeyword && matchFirst && matchLast;
            });
            renderParticipants(filtered);
        };

        document.getElementById('reset-filters-btn').onclick = () => {
            document.getElementById('filter-input').value = '';
            document.querySelectorAll('.letters button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.letters button[data-letter="all"]').forEach(b => b.classList.add('active'));
            renderParticipants(participantsData);
        };
    });
</script>
</body>
</html>
