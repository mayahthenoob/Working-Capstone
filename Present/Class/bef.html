<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathematics | Quiz Carnival</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #3498db;
            --success: #27ae60;
            --warning: #f1c40f;
            --danger: #e74c3c;
            --border-color: #ccc;
            --bg-light: #f4f7f6;
            --text-main: #333;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            color: var(--text-main);
        }

        /* CONTAINER */
        .container {
            max-width: 1000px;
            margin: 60px auto; 
            padding: 0 20px;
        }

        h1 { font-size: 2rem; margin-bottom: 20px; }

        /* TABS */
        .tabs-container {
            display: flex;
            gap: 0;
            position: relative;
            z-index: 2;
        }

        .tab-btn {
            background-color: #f8f9fa;
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            cursor: pointer;
            color: #7f8c8d;
            border-radius: 8px 8px 0 0;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: 5px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background-color: white;
            color: var(--primary);
            font-weight: bold;
            border-bottom: 1px solid white;
            margin-bottom: -1px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* CARD STYLE */
        .card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-bottom: 15px;
        }

        .connected-card { border-top-left-radius: 0; }

        .card-header {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            gap: 8px;
        }

        .card-header h2 { margin: 0 8px; flex-grow: 1; font-size: 1rem; }

        .collapse-text { color: var(--primary); cursor: pointer; font-size: 0.85rem; }

        .arrow-circle {
            width: 28px; height: 28px;
            background-color: #ecf0f1;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.3s ease;
        }

        .collapsible-wrapper {
            overflow: hidden;
            transition: max-height 0.5s ease;
        }

        .card-body { padding: 15px 20px; }

        /* WEEK CONTENT STYLES */
        .week-strip {
            color: white; padding: 8px 15px;
            display: flex; align-items: center; gap: 8px;
            font-weight: 600; margin: 10px 15px; border-radius: 8px;
        }
        .strip-purple { background-color: #8e44ad; }
        .strip-green { background-color: #27ae60; }

        .item-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 15px; border: 1px solid transparent;
            border-radius: 8px; margin: 8px 15px; background-color: #fff;
            transition: border 0.3s ease;
        }
        .item-row:hover { border: 1px solid var(--primary); }

        .item-info { display: flex; gap: 10px; align-items: center; }
        .item-info i {
            font-size: 20px; width: 28px; height: 28px;
            border: 1px solid var(--border-color); border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
        }
        .icon-quiz { color: #e91e63; }
        .item-text a { color: var(--primary); text-decoration: none; font-weight: 500; }

        .todo-btn {
            background: transparent; border: 1px solid var(--border-color);
            color: #2e7d32; padding: 4px 10px; border-radius: 4px;
            font-size: 0.8rem; display: flex; align-items: center; gap: 5px; cursor: pointer;
        }

        /* GRADE TABLE STYLES */
        .grade-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .grade-table th { 
            text-align: left; padding: 12px; background: #fafafa; 
            color: #666; font-size: 0.85rem; border-bottom: 2px solid #eee;
        }
        .grade-table td { padding: 15px 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px; margin-bottom: 20px;
        }
        .stat-box { background: #f8f9fa; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
        .stat-val { display: block; font-size: 1.25rem; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.7rem; color: #7f8c8d; text-transform: uppercase; letter-spacing: 0.5px; }

        /* PARTICIPANTS CSS (Shortened for brevity as per your previous style) */
        #participants-tab .search-container { position: relative; margin: 20px 0; }
        #participants-tab .search-container input {
            width: 100%; padding: 12px 40px; border: 1px solid #eee; border-radius: 8px; box-sizing: border-box;
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-left: 6px; }
        .status-online { background: var(--success); }
        .status-recent { background: var(--warning); }
        .status-never  { background: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <h1>Mathematics</h1>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="openTab(event, 'class-tab')">
            <i class='bx bx-book'></i> Class
        </button>
        <button class="tab-btn" onclick="openTab(event, 'participants-tab')">
            <i class='bx bx-male-female'></i> Participants
        </button>
        <button class="tab-btn" onclick="openTab(event, 'grades-tab')">
            <i class='bx bx-bar-chart-alt-2'></i> Grades
        </button>
    </div>

    <div id="class-tab" class="tab-content active">
        <section class="card connected-card">
            <div class="card-header">
                <div class="arrow-circle" id="gen-arrow" onclick="toggleSection('gen-wrapper')">
                    <i class='bx bx-chevron-down'></i>
                </div>
                <h2>General</h2>
                <span class="collapse-text" id="gen-btn" onclick="toggleSection('gen-wrapper', 'gen-btn', 'gen-arrow', true)">Collapse</span>
            </div>
            <div class="collapsible-wrapper" id="gen-wrapper">
                <div class="card-body">
                    <div style="color: #e67e22; font-family: monospace; margin-bottom: 15px;">
                        <span id="date"></span><br>
                        <span style="font-size: 1.5rem;" id="time"></span>
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px;">
                        <div><strong>Class Name:</strong> Mathematics</div>
                        <div><strong>Instructor:</strong> Mr. Darell Mason</div>
                        <div><strong>Email:</strong> DarellM@gss.edu.gd</div>
                    </div>
                </div>
            </div>
        </section>

        <section class="card">
            <div class="card-header">
                <div class="arrow-circle" id="week1-arrow" onclick="toggleSection('week1-wrapper')">
                    <i class='bx bx-chevron-down'></i>
                </div>
                <h2>12 January - 18 January</h2>
            </div>
            <div class="collapsible-wrapper" id="week1-wrapper">
                <div class="week-strip strip-purple"><i class='bx bxs-spreadsheet'></i> Quizzes</div>
                <div class="item-row">
                    <div class="item-info">
                        <i class='bx bx-search-alt-2 icon-quiz'></i>
                        <div class="item-text"><a href="#">Quiz 1: Algebra Basics</a></div>
                    </div>
                    <div class="todo-btn"><i class='bx bx-hourglass'></i> To Do</div>
                </div>
            </div>
        </section>
    </div>

    <div id="participants-tab" class="tab-content">
        <div class="card connected-card">
            <div class="card-body">
                <h2>Participants</h2>
                <div class="search-container">
                    <input type="text" id="participantsSearch" placeholder="Quick search participants...">
                </div>
                <div id="participantsList"></div>
            </div>
        </div>
    </div>

    <div id="grades-tab" class="tab-content">
        <div class="card connected-card">
            <div class="card-body">
                <div class="stats-grid">
                    <div class="stat-box">
                        <span class="stat-label">Weighted Mean</span>
                        <span class="stat-val" id="avg-grade">0%</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Completed</span>
                        <span class="stat-val" id="completed-count">0/0</span>
                    </div>
                </div>

                <table class="grade-table">
                    <thead>
                        <tr>
                            <th>Assessment</th>
                            <th>Weight</th>
                            <th>Grade</th>
                            <th>Percentage</th>
                        </tr>
                    </thead>
                    <tbody id="grade-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script>
    // DATA
    const gradeData = [
        { name: "Quiz 1: Algebra Basics", weight: 25, score: 18, total: 20 },
        { name: "Quiz 2: Linear Equations", weight: 25, score: 15, total: 20 },
        { name: "Quiz 3: Trigonometry I", weight: 50, score: 22, total: 25 }
    ];

    const participantsData = [
        { name: "Joe Doe", role: "Student", group: "IT1A", status: "online" },
        { name: "Darell Mason", role: "Teacher", group: "", status: "online" }
    ];

    // INITIALIZATION
    window.onload = () => {
        updateClock();
        renderGrades();
        renderParticipants(participantsData);
        refreshHeights();
    };

    // CLOCK
    function updateClock() {
        const now = new Date();
        document.getElementById("date").textContent = now.toDateString();
        document.getElementById("time").textContent = now.toLocaleTimeString();
    }
    setInterval(updateClock, 1000);

    // TABS
    function openTab(evt, tabId) {
        document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabId).classList.add("active");
        evt.currentTarget.classList.add("active");
        if(tabId === 'class-tab') refreshHeights();
    }

    // COLLAPSE
    const state = { 'gen-wrapper': true, 'week1-wrapper': true };
    function toggleSection(id) {
        const el = document.getElementById(id);
        const arrow = document.getElementById(id.replace('-wrapper', '-arrow'));
        if (state[id]) {
            el.style.maxHeight = "0px";
            arrow.style.transform = "rotate(-90deg)";
        } else {
            el.style.maxHeight = el.scrollHeight + "px";
            arrow.style.transform = "rotate(0deg)";
        }
        state[id] = !state[id];
    }

    function refreshHeights() {
        Object.keys(state).forEach(id => {
            const el = document.getElementById(id);
            if(state[id]) el.style.maxHeight = el.scrollHeight + "px";
        });
    }

    // RENDER GRADES
    function renderGrades() {
        const body = document.getElementById('grade-body');
        let totalWeight = 0;
        let weightedSum = 0;

        body.innerHTML = gradeData.map(g => {
            const pct = (g.score / g.total) * 100;
            weightedSum += (pct * (g.weight / 100));
            return `
                <tr>
                    <td>${g.name}</td>
                    <td>${g.weight}%</td>
                    <td>${g.score} / ${g.total}</td>
                    <td style="color: ${pct >= 80 ? 'var(--success)' : '#e67e22'}; font-weight: 600;">
                        ${pct.toFixed(1)}%
                    </td>
                </tr>
            `;
        }).join('');

        document.getElementById('avg-grade').textContent = weightedSum.toFixed(1) + "%";
        document.getElementById('completed-count').textContent = `${gradeData.length}/5`;
    }

    // RENDER PARTICIPANTS
    function renderParticipants(data) {
        const list = document.getElementById('participantsList');
        list.innerHTML = data.map(p => `
            <div style="display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee;">
                <span>${p.name} (${p.role})</span>
                <span><span class="status-dot status-${p.status}"></span></span>
            </div>
        `).join('');
    }
</script>

</body>
</html>
