<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            margin: 0;
            padding: 40px;
            background-color: white;
            font-family: 'Inter', sans-serif;
            color: #1d2125;
        }

        .header-section {
            max-width: 1200px;
            margin: 0 auto 20px auto;
        }

        h1 { font-size: 32px; margin: 0 0 10px 0; font-weight: 700; }

        .controls {
            display: flex;
            gap: 12px;
            padding-top: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .custom-dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-trigger,
        .btn-filter-static {
            border: 1px solid #868e96;
            border-radius: 8px;
            padding: 0 16px;
            background: white;
            font-size: 14px;
            color: #495057;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 100px;
            height: 40px;
            box-sizing: border-box;
        }

        .dropdown-trigger:hover,
        .btn-filter-static:hover {
            background-color: #f8f9fa;
        }

        .search-input {
            border: 1px solid #868e96;
            border-radius: 8px;
            padding: 0 12px;
            background: white;
            font-size: 14px;
            color: #495057;
            flex-grow: 1;
            max-width: 350px;
            outline: none;
            height: 40px;
            box-sizing: border-box;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            background: white;
            min-width: 180px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            z-index: 100;
            padding: 8px 0;
            border: 1px solid #f0f0f0;
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-item {
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 500;
            color: #1d2125;
            cursor: pointer;
        }

        .dropdown-item:hover {
            background-color: #f8f9fa;
            color: #0056b3;
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 20px auto 0 auto;
        }

        .course-grid.list-view {
            display: block;
        }

        .card-container {
            width: 100%;
            height: 200px;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            background-size: cover;
            background-position: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: flex-end;
            text-decoration: none;
            color: inherit;
            transition: transform 0.4s ease;
        }

        .card-container:hover {
            transform: translateY(-5px);
        }

        .card-container::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.1));
        }

        .card-content {
            position: relative;
            padding: 20px;
            color: white;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.4s ease;
            width: 100%;
        }

        .card-container:hover .card-content {
            opacity: 1;
            transform: translateY(0);
        }

        .card-content h3 {
            font-size: 18px;
            margin: 0 0 4px 0;
            font-weight: 700;
        }

        .card-content p {
            font-size: 13px;
            margin: 0;
            opacity: 0.9;
        }

        .btn-visit {
            display: inline-block;
            border: 2px solid white;
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 12px;
            margin-top: 10px;
            color: white;
            transition: 0.3s;
        }

        .btn-visit:hover {
            background: white;
            color: #111;
        }

        .course-grid.list-view .card-container {
            height: 80px;
            margin-bottom: 10px;
            background-image: none !important;
            background-color: #f8f9fa;
            box-shadow: none;
            border: 1px solid #eee;
            border-radius: 12px;
        }

        .course-grid.list-view .card-container:hover {
            transform: none;
        }

        .course-grid.list-view .card-container::before {
            display: none;
        }

        .course-grid.list-view .card-content {
            opacity: 1;
            transform: none;
            padding: 15px 20px;
            color: #1d2125;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .course-grid.list-view .card-content p {
            color: #666;
        }

        .course-grid.list-view .btn-visit {
            background: #1d2125;
            color: white;
            border: none;
            margin-top: 0;
        }

        .course-grid.list-view .btn-visit:hover {
            background: #333;
            color: white;
        }
    </style>
</head>
<body>

<div class="header-section">
    <h1>My classes</h1>

    <div class="controls">
        <button class="btn-filter-static">All</button>

        <input type="text" class="search-input" placeholder="Search">

        <div class="custom-dropdown" id="sortDropdown">
            <button class="dropdown-trigger">Sort By</button>
            <div class="dropdown-menu">
                <div class="dropdown-item">Date</div>
                <div class="dropdown-item">Class</div>
            </div>
        </div>

        <div class="custom-dropdown" id="viewDropdown">
            <button class="dropdown-trigger">View</button>
            <div class="dropdown-menu">
                <div class="dropdown-item" data-view="card">Card</div>
                <div class="dropdown-item" data-view="list">List</div>
            </div>
        </div>
    </div>
</div>

<div class="course-grid" id="courseGrid">

    <a href="#" class="card-container" style="background-image: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=400');">
        <div class="card-content">
            <h3>Agriculture Science</h3>
            <p>D. St.Louis</p>
            <span class="btn-visit">Visit</span>
        </div>
    </a>

    <a href="#" class="card-container" style="background-image: url('https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&q=80&w=400');">
        <div class="card-content">
            <h3>General Science</h3>
            <p>C. Williams</p>
            <span class="btn-visit">Visit</span>
        </div>
    </a>

    <a href="#" class="card-container" style="background-image: url('https://images.unsplash.com/photo-1587620962725-abab7fe55159?auto=format&fit=crop&q=80&w=400');">
        <div class="card-content">
            <h3>Mathematics</h3>
            <p>Mr. Darell Mason</p>
            <span class="btn-visit">Visit</span>
        </div>
    </a>

</div>

<script>
    const courseGrid = document.getElementById('courseGrid');

    document.querySelectorAll('.dropdown-trigger').forEach(trigger => {
        trigger.addEventListener('click', (e) => {
            e.stopPropagation();
            const menu = trigger.nextElementSibling;

            document.querySelectorAll('.dropdown-menu').forEach(m => {
                if (m !== menu) m.classList.remove('show');
            });

            menu.classList.toggle('show');
        });
    });

    document.querySelectorAll('#viewDropdown .dropdown-item').forEach(item => {
        item.addEventListener('click', (e) => {
            const viewType = item.getAttribute('data-view');
            const trigger = item.closest('.custom-dropdown').querySelector('.dropdown-trigger');

            if (viewType === 'list') {
                courseGrid.classList.add('list-view');
                trigger.textContent = 'View: List';
            } else {
                courseGrid.classList.remove('list-view');
                trigger.textContent = 'View: Card';
            }
        });
    });

    document.querySelectorAll('#sortDropdown .dropdown-item').forEach(item => {
        item.addEventListener('click', (e) => {
            const trigger = item.closest('.custom-dropdown').querySelector('.dropdown-trigger');
            trigger.textContent = 'Sort By: ' + item.textContent;
        });
    });

    window.addEventListener('click', () => {
        document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
    });
</script>

</body>
</html>
